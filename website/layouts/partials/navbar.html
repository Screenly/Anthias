<nav class="bg-brand-dark py-4 px-6 md:px-12 lg:px-20">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        {{- $logoMobile := resources.Get "images/logo-full-mobile.svg" -}}
        {{- $logoDesk := resources.Get "images/logo-full.svg" -}}
        <a href="/" class="shrink-0">
            <img class="md:hidden h-7" src="{{ $logoMobile.RelPermalink }}" alt="Anthias" />
            <img class="hidden md:block h-7" src="{{ $logoDesk.RelPermalink }}" alt="Anthias" />
        </a>

        <button id="menu-toggle" class="lg:hidden border-0 bg-transparent p-1" aria-label="Toggle navigation" aria-expanded="false" aria-controls="mobile-menu">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>

        <div class="hidden lg:flex items-center gap-8">
            <ul class="flex gap-1 list-none m-0 p-0">
                {{ range site.Menus.main }}
                <li>
                    <a class="text-white/70 no-underline px-3 py-2 rounded-md text-sm font-medium hover:text-white transition-colors"
                       href="{{ .URL }}"
                       {{ if .Params.external }}target="_blank" rel="noopener"{{ end }}>
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
            </ul>
            <a class="btn-primary text-sm" href="https://github.com/Screenly/Anthias">GitHub</a>
        </div>
    </div>

    <div id="mobile-menu" class="hidden lg:hidden mt-4 max-w-7xl mx-auto border-t border-white/10 pt-4">
        <ul class="flex flex-col gap-0 list-none m-0 p-0">
            {{ range site.Menus.main }}
            <li>
                <a class="text-white/70 no-underline block py-2.5 text-sm hover:text-white transition-colors"
                   href="{{ .URL }}"
                   {{ if .Params.external }}target="_blank" rel="noopener"{{ end }}>
                    {{ .Name }}
                </a>
            </li>
            {{ end }}
        </ul>
        <a class="btn-primary mt-3 mb-1 text-sm text-center block" href="https://github.com/Screenly/Anthias">GitHub</a>
    </div>
</nav>
