{{ define "main" }}
<header class="bg-brand-dark py-12 md:py-16 px-6 md:px-12 lg:px-20">
    <div class="max-w-4xl mx-auto">
        <a href="/docs/" class="text-white/60 text-sm hover:text-white transition">← Documentation</a>
        <h1 class="text-white text-3xl md:text-4xl font-extrabold tracking-tight mt-3">{{ .Title }}</h1>
        {{ with .Description }}<p class="text-white/60 text-base mt-3 max-w-2xl">{{ . }}</p>{{ end }}
    </div>
</header>

<section class="bg-white py-12 lg:py-16 px-6 md:px-12 lg:px-20">
    <div class="max-w-4xl mx-auto">
        <article class="docs-prose">
            {{ .Content }}
        </article>
    </div>
</section>
{{ end }}
