<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}Anthias is the world's most popular open source digital signage solution. Turn any Raspberry Pi or PC into a powerful digital sign displaying images, videos, and web pages.{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">

    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="Turn any Raspberry Pi or PC into a powerful digital sign. Free, open-source digital signage software.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:image" content="{{ "assets/images/overview.png" | absURL }}">
    <meta property="og:site_name" content="Anthias">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ .Title }}">
    <meta name="twitter:description" content="Turn any Raspberry Pi or PC into a powerful digital sign. Free, open-source digital signage software.">
    <meta name="twitter:image" content="{{ "assets/images/overview.png" | absURL }}">

    <link rel="icon" href="/assets/images/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles/style.css">
    <link rel="stylesheet" href="/assets/styles/chroma.css">

    {{ if .IsHome }}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Anthias",
      "description": "The world's most popular open source digital signage solution.",
      "url": "https://anthias.screenly.io",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Linux",
      "license": "https://github.com/Screenly/Anthias/blob/master/LICENSE",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Screenly, Inc",
        "url": "https://www.screenly.io"
      }
    }
    </script>
    {{ end }}
  </head>
  <body class="font-sans text-base text-brand-near-black">
    {{ partial "navbar.html" . }}

    {{ block "main" . }}{{ end }}

    {{ partial "footer.html" . }}

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var toggle = document.getElementById('menu-toggle');
        var menu = document.getElementById('mobile-menu');
        if (toggle && menu) {
          toggle.addEventListener('click', function () {
            var isOpen = !menu.classList.toggle('hidden');
            toggle.setAttribute('aria-expanded', isOpen);
          });
          menu.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
              menu.classList.add('hidden');
              toggle.setAttribute('aria-expanded', 'false');
            });
          });
        }

        document.querySelectorAll('[data-accordion]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var targetId = this.getAttribute('data-accordion');
            var target = document.getElementById(targetId);
            var isOpen = !target.classList.contains('hidden');

            document.querySelectorAll('[data-accordion-content]').forEach(function (c) {
              c.classList.add('hidden');
            });
            document.querySelectorAll('[data-accordion]').forEach(function (b) {
              b.querySelector('.icon-minus').classList.add('hidden');
              b.querySelector('.icon-plus').classList.remove('hidden');
              b.setAttribute('aria-expanded', 'false');
            });

            if (!isOpen) {
              target.classList.remove('hidden');
              this.querySelector('.icon-minus').classList.remove('hidden');
              this.querySelector('.icon-plus').classList.add('hidden');
              this.setAttribute('aria-expanded', 'true');
            }
          });
        });
      });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W6BH3H6SZ6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-W6BH3H6SZ6');
    </script>
  </body>
</html>
