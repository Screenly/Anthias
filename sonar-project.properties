sonar.projectKey=Screenly_screenly-ose
sonar.organization=screenly
sonar.python.version=3.13

# Sonar auto-detects sources without this, but listing them explicitly
# prevents the bare repo root from being scanned as source code (which
# pulled in test files and tripped quality-rule false positives).
sonar.sources=anthias_app,anthias_django,api,celery_tasks.py,host_agent.py,lib,settings.py,viewer

# Test code — Sonar applies a narrower rule set here. A handful of
# rules still fire on fixtures that intentionally exercise the
# patterns they're designed to catch; those are silenced via
# sonar.issue.ignore.multicriteria below.
sonar.tests=tests,api/tests

# Coverage report path matches [tool.coverage.xml].output in pyproject.toml.
sonar.python.coverage.reportPaths=coverage.xml

# Files we don't expect or measure coverage on. Keep aligned with the
# omit list under [tool.coverage.run] in pyproject.toml.
sonar.coverage.exclusions=**/migrations/**,**/__init__.py,anthias_django/asgi.py,anthias_django/routing.py,anthias_django/urls.py,anthias_django/wsgi.py,anthias_app/management/**,host_agent.py,viewer/__main__.py

# Sonar rule suppressions limited to test files. The narrower test
# ruleset still flags a handful of patterns that are intentional in
# tests; rather than litter them with NOSONAR comments, ignore the
# specific rules across the test trees.
#   - S2068: "hard-coded credential" — auth tests need literal passwords.
#   - S1244: float equality — exact-value assertions on parsed numbers.
#   - S5864: identity check on sentinels (MagicMock returned via `is`).
#   - S7492: "unpack this comprehension" — readable list-comp inside
#     all() reads better than a generator with star-unpack here.
sonar.issue.ignore.multicriteria=t1,t2,t3,t4
sonar.issue.ignore.multicriteria.t1.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.t1.resourceKey=**/test_*.py
sonar.issue.ignore.multicriteria.t2.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.t2.resourceKey=**/test_*.py
sonar.issue.ignore.multicriteria.t3.ruleKey=python:S5864
sonar.issue.ignore.multicriteria.t3.resourceKey=**/test_*.py
sonar.issue.ignore.multicriteria.t4.ruleKey=python:S7492
sonar.issue.ignore.multicriteria.t4.resourceKey=**/test_*.py
