# vim: ft=yaml.docker-compose

services:
  anthias-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    environment:
      - HOME=/data
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ENVIRONMENT=test
    stdin_open: true
    tty: true
    volumes:
      - .:/usr/src/app
      - anthias-data:/data

  anthias-celery:
    # Reuses the test image — server and celery share their entire root
    # filesystem, and the test image inherits from the same base apt
    # layer + venv. The compose-level override below runs the celery
    # worker against that image instead of building a separate one.
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    command: >
      celery -A celery_tasks.celery worker -B -n worker@anthias
      --loglevel=info --schedule /tmp/celerybeat-schedule
    depends_on:
      - anthias-test
      - redis
    environment:
      - HOME=/data
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: always
    volumes:
      - anthias-data:/data

  redis:
    image: redis:alpine

volumes:
  anthias-data:
  redis-data:
