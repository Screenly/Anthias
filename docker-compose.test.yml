# vim: ft=yaml.docker-compose

services:
  anthias-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    environment:
      - HOME=/data
      - ENVIRONMENT=test
    stdin_open: true
    tty: true
    volumes:
      - .:/usr/src/app
      - anthias-data:/data

volumes:
  anthias-data:
