name: 'Anthias CodeQL'

# Each `id:` filter expects a single rule ID — list-of-strings syntax
# is silently ignored by codeql-action. Use one exclude block per
# rule so the filters actually apply.
#
# All three rules fire on intentional operator-controlled paths:
#   * py/url-redirection / py/path-injection on assets_download +
#     assets_preview, sanitised at function entry by
#     _safe_redirect_uri (urlparse → urlunparse rebuild after a
#     scheme allowlist + netloc check) and _safe_local_asset_path
#     (basename → join trusted base → realpath → startswith assert).
#   * py/full-server-side-request-forgery on anthias_common.utils.url_fails,
#     which IS by design fetching operator-supplied asset URIs to
#     verify they're still reachable (called from the celery
#     revalidate_asset_urls sweep).
#
# CodeQL still flags these because the validation lives in helper
# functions a few lines from the sink; suppressing here documents the
# decision in-repo (auditable in PR diffs) instead of dismissing each
# alert individually via the GitHub UI.
query-filters:
  - exclude:
      id: py/url-redirection
  - exclude:
      id: py/path-injection
  - exclude:
      id: py/full-server-side-request-forgery
