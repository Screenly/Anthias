name: Python Checks

on:
  push:
    branches:
      - master
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-checks.yaml'
      - '.github/actions/setup-python-uv/**'
  pull_request:
    branches:
      - master
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-checks.yaml'
      - '.github/actions/setup-python-uv/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python + uv (dev-host)
        uses: ./.github/actions/setup-python-uv
        with:
          group: dev-host

      - name: Run Ruff linting checks
        run: uv run ruff check .

      - name: Run Ruff formatting checks
        run: uv run ruff format --check .

  mypy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python + uv (mypy)
        uses: ./.github/actions/setup-python-uv
        with:
          group: mypy

      # The django-stubs plugin imports anthias_django.settings, which
      # transitively instantiates AnthiasSettings(). On first run that
      # tries to read ~/.anthias/anthias.conf — write a minimal valid
      # one with the section headers AnthiasSettings expects.
      - name: Prepare config directory
        run: |
          mkdir -p ~/.anthias
          cat > ~/.anthias/anthias.conf <<'CONF'
          [main]
          [viewer]
          [auth_basic]
          CONF

      - name: Run mypy
        run: uv run mypy .
