---
name: Ansible Lint

on:
  push:
    branches:
      - master
      - production
    paths:
      - 'ansible/**'
  pull_request:
    branches:
      - master
      - production
    paths:
      - 'ansible/**'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint ansible/
