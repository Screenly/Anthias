name: Balena unpin devices

# Devices flashed from pre-#2098 disk images provision themselves
# pinned to the release baked into the image, so they never receive
# OTA updates — and new ones keep appearing as people flash old
# images. This hourly job brings them current: it clears the pin on
# every pinned device (minus the `anthias_keep_pinned` opt-out tag),
# starts a staged-tranche balenaOS update (--os-update) on online
# devices still on an old OS, and bumps the supervisor (--supervisor)
# on devices already on the target OS. All the logic lives in
# bin/balena_unpin_devices.py; the OS-update/supervisor phases are
# bounded to a small per-run tranche so the backlog walks forward a
# slice at a time rather than stampeding the fleet.
#
# PRIVACY: this repo is public, so these workflow logs are
# world-readable. The script's default output is aggregate-only
# (counts + release histogram) by design — never pass --verbose here,
# it prints per-device uuids.

on:
  schedule:
    # Hourly at :43 — offset from the top-of-hour cron stampede that
    # GitHub-hosted runners see (cf. mirror-bun-image.yaml).
    - cron: '43 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        # Defaults to true so a casual "Run workflow" click only
        # reports; untick to unpin immediately instead of waiting for
        # the next scheduled run (which always applies).
        description: Only report pinned devices; do not unpin.
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: balena-unpin-devices
  cancel-in-progress: false

jobs:
  unpin:
    # Scheduled workflows are disabled on forks by default, but guard
    # anyway so a fork that enables Actions doesn't fail hourly on the
    # missing BALENA_TOKEN secret.
    if: github.repository == 'Screenly/Anthias'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The script is stdlib-only — no dependency install needed; 3.13
      # matches the repo's requires-python.
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Unpin + OS-update + supervisor
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_TOKEN }}
          # Empty on schedule events, "true"/"false" on dispatch.
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          # --os-update + --supervisor each move only a small tranche
          # per run (script default 5%); the hourly cadence ramps the
          # backlog. Never pass --verbose — these logs are public.
          if [[ "$DRY_RUN" == "true" ]]; then
            python3 bin/balena_unpin_devices.py --os-update --supervisor
          else
            python3 bin/balena_unpin_devices.py \
              --os-update --supervisor --apply
          fi
