name: Docker Image Build

on:
  push:
    branches:
      - master
    paths:
      - '**'
      - '!.editorconfig'
      - '!website/**'
      - '!.github/workflows/deploy-website.yaml'
      - '!.github/workflows/build-balena-disk-image.yaml'
      - '!.github/workflows/python-lint.yaml'
      - '!.github/workflows/generate-openapi-schema.yml'
      - '!.github/workflows/docker-test.yml'
      - '!.github/pull_request_template.md'
      - '!.github/dependabot.yml'
      - '!.github/release.yml'
      - '!CONTRIBUTING.md'
      - '!README.md'
      - '!docs/**'
      - '!bin/install.sh'
      - '!bin/upgrade_containers.sh'
      - '!bin/start_development_server.sh'
      - '!tests/**'
      - '!docker/Dockerfile.dev'
      - '!.cursor/**'
      - '!.claude/**'
      - '!src/anthias_host_agent/**'
      # rpi-imager generator and the bun installer script don't
      # affect the container image build; skip docker-build runs that
      # only touch them.
      - '!tools/raspberry_pi_imager/**'
      - '!.github/workflows/scripts/install-bun.sh'
  workflow_dispatch:

jobs:
  run-tests:
    uses: ./.github/workflows/docker-test.yaml

  buildx:
    needs: run-tests
    # Scoped per-job (not at workflow level) so `run-tests` and any
    # future read-only job don't inherit `packages: write`. `buildx`
    # needs it so `docker login ghcr.io` with GITHUB_TOKEN can push
    # both ghcr.io/screenly/anthias-* image tags and the
    # `buildcache-*` registry cache tags written by --cache-backend=
    # registry. `contents: read` is the implicit default but pinned
    # explicitly so a future workflow edit can't silently lose
    # checkout access.
    permissions:
      contents: read
      packages: write
    strategy:
      # Don't cancel sibling jobs on the first failure: any platform that
      # has already finished building its images will have pushed the
      # immutable <short-hash>-<board> tags, which are harmless on their
      # own. Only the publish-latest job below — gated on the entire
      # matrix succeeding — moves the floating latest-* tag, so a partial
      # failure leaves users on the previous coherent latest-* set
      # instead of a half-pushed mix of old + new images.
      #
      # The matrix is intentionally only on `board`, not `(board, service)`:
      # buildkit's per-runner cache hashes apt-get-update output (timestamps
      # in /var/lib/apt/lists/*, mirror selection) into the layer digest,
      # so the same package list installed on two different runners
      # produces two different layer hashes. Building all services for
      # one board on a single runner means the base apt layer is hashed
      # once and shared across server / viewer / test / etc. — which is
      # what makes Dockerfile.base.j2's include-shared layer actually
      # dedup at the registry level. See refactor: drop celery image.
      fail-fast: false
      matrix:
        board: ['pi2', 'pi3', 'pi4-64', 'pi5', 'x86', 'arm64']
        python-version: ["3.13"]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.9.17'

      - name: Install dependencies
        run: |
          uv venv
          uv pip install --group docker-image-builder

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Create and use dedicated builder
        run: |
          docker buildx create --use --name multiarch-builder
          docker buildx inspect --bootstrap

      - name: Login to Docker Hub
        if: success() && github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        if: success() && github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Containers
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
          # On push events (master): use BuildKit's registry cache
          # backend — pushes cache to ghcr.io/screenly/anthias-
          # <service>:buildcache-<board> so subsequent push runs of
          # the same board can pull cached layers without
          # re-installing ~825 MB of apt packages from scratch.
          #
          # On workflow_dispatch (manual runs on any branch): fall
          # through to `local` mode — a per-runner ephemeral
          # directory, so effectively no-cache. workflow_dispatch
          # also skips the `docker login ghcr.io` step above (it's
          # gated on `event_name == 'push'`), so registry cache
          # would have no auth to write with anyway. This workflow
          # has no `pull_request` trigger; PRs never run this job.
          BUILDX_CACHE_BACKEND: ${{ github.event_name == 'push' && 'registry' || 'local' }}
        run: |
          uv run python -m tools.image_builder \
            --build-target=${{ matrix.board }} \
            --service=server \
            --service=viewer \
            --service=redis \
            ${{ github.event_name == 'push' && '--push --skip-latest-tag' || '' }}

  # Mirror the immutable <short-hash>-<board> tags pushed by the buildx
  # matrix onto the floating latest-<board> tag. Runs only after every
  # buildx job has succeeded, so latest-* is never advanced from a
  # half-pushed build matrix.
  #
  # Deliberately a single sequential job (no matrix): retags run inside
  # one `set -euo pipefail` block, so a transient registry error stops
  # further retags rather than racing other parallel runners that would
  # blindly continue to advance latest-* on their slice. A preflight
  # checks every <short-hash>-<board> tag is resolvable before any
  # retag fires, so a missing source tag fails the job before it
  # mutates the registry. `imagetools create` re-points the registry
  # tag to the existing manifest without re-uploading layers, and each
  # call is wrapped in 5-attempt exponential backoff so a transient
  # 429 / 5xx doesn't strand latest-* half-mirrored.
  #
  # Two registries, two steps: `ghcr.io/screenly/anthias-*` is the new
  # primary (rate-limit-friendly, free unlimited storage for public
  # packages, auth via the workflow-issued GITHUB_TOKEN with
  # `packages: write`) and is the hard-fail step. `screenly/anthias-*`
  # on Docker Hub stays as a parallel mirror during the migration
  # window so devices that haven't yet picked up the compose-template
  # flip keep getting `latest-*` advanced — but it runs in its own
  # step with `continue-on-error: true` because Docker Hub's
  # unauthenticated/free-tier pull rate limit periodically 429s the
  # manifest GETs that `imagetools create` issues, and GHCR being
  # current is what actually matters for new devices. GHCR runs first
  # so the canonical primary is up to date even if Docker Hub flakes.
  # The legacy `screenly/srly-ose-*` namespace was dropped: every
  # device that has run `upgrade_containers.sh` since 2023-02
  # (b9998438) is on `screenly/anthias-*` already, so the parallel
  # `srly-ose-*` push was buying no real back-compat in exchange for
  # half the manifest GETs (one of two reasons d568602's publish hit
  # Docker Hub's 429).
  publish-latest:
    needs: buildx
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    # See `buildx.permissions` above for rationale; same scoping reason.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror short-hash tags to latest-<board> (GHCR)
        env:
          NAMESPACE: ghcr.io/screenly/anthias
        run: bash .github/workflows/scripts/mirror-latest-tags.sh

      # Soft-fail: Docker Hub's free-tier pull rate limit regularly 429s
      # the manifest GETs that `imagetools create` issues, and GHCR
      # (mirrored above) is the canonical primary — failing the whole
      # job because the mirror flaked would needlessly red-X otherwise
      # green pushes. The step still runs to completion so partial
      # mirrors get as far as they can.
      - name: Mirror short-hash tags to latest-<board> (Docker Hub)
        continue-on-error: true
        env:
          NAMESPACE: screenly/anthias
        run: bash .github/workflows/scripts/mirror-latest-tags.sh
