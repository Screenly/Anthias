name: Docker Image Build

on:
  push:
    branches:
      - master
    paths:
      - '**'
      - '!.editorconfig'
      - '!webview/**'
      - '!website/**'
      - '!.github/workflows/deploy-website.yaml'
      - '!.github/workflows/build-webview.yaml'
      - '!.github/workflows/build-balena-disk-image.yaml'
      - '!.github/workflows/python-lint.yaml'
      - '!.github/workflows/generate-openapi-schema.yml'
      - '!.github/workflows/docker-test.yml'
      - '!.github/pull_request_template.md'
      - '!.github/dependabot.yml'
      - '!.github/release.yml'
      - '!CONTRIBUTING.md'
      - '!README.md'
      - '!docs/**'
      - '!bin/install.sh'
      - '!bin/upgrade_containers.sh'
      - '!bin/start_development_server.sh'
      - '!tests/**'
      - '!docker/Dockerfile.dev'
      - '!.cursor/**'
      - '!.claude/**'
      - '!host_agent.py'
  workflow_dispatch:

jobs:
  run-tests:
    uses: ./.github/workflows/docker-test.yaml

  buildx:
    needs: run-tests
    # Scoped per-job (not at workflow level) so `run-tests` and any
    # future read-only job don't inherit `packages: write`. `buildx`
    # needs it so `docker login ghcr.io` with GITHUB_TOKEN can push
    # both ghcr.io/screenly/anthias-* image tags and the
    # `buildcache-*` registry cache tags written by --cache-backend=
    # registry. `contents: read` is the implicit default but pinned
    # explicitly so a future workflow edit can't silently lose
    # checkout access.
    permissions:
      contents: read
      packages: write
    strategy:
      # Don't cancel sibling jobs on the first failure: any platform that
      # has already finished building its images will have pushed the
      # immutable <short-hash>-<board> tags, which are harmless on their
      # own. Only the publish-latest job below — gated on the entire
      # matrix succeeding — moves the floating latest-* tag, so a partial
      # failure leaves users on the previous coherent latest-* set
      # instead of a half-pushed mix of old + new images.
      #
      # The matrix is intentionally only on `board`, not `(board, service)`:
      # buildkit's per-runner cache hashes apt-get-update output (timestamps
      # in /var/lib/apt/lists/*, mirror selection) into the layer digest,
      # so the same package list installed on two different runners
      # produces two different layer hashes. Building all services for
      # one board on a single runner means the base apt layer is hashed
      # once and shared across server / viewer / test / etc. — which is
      # what makes Dockerfile.base.j2's include-shared layer actually
      # dedup at the registry level. See refactor: drop celery image.
      fail-fast: false
      matrix:
        board: ['pi2', 'pi3', 'pi4-64', 'pi5', 'x86']
        python-version: ["3.13"]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.9.17'

      - name: Install dependencies
        run: |
          uv venv
          uv pip install --group docker-image-builder

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Create and use dedicated builder
        run: |
          docker buildx create --use --name multiarch-builder
          docker buildx inspect --bootstrap

      - name: Login to Docker Hub
        if: success() && github.event_name == 'push'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        if: success() && github.event_name == 'push'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Containers
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
          # On push events (master): use BuildKit's registry cache
          # backend — pushes cache to ghcr.io/screenly/anthias-
          # <service>:buildcache-<board> so subsequent push runs of
          # the same board can pull cached layers without
          # re-installing ~825 MB of apt packages from scratch.
          #
          # On workflow_dispatch (manual runs on any branch): fall
          # through to `local` mode — a per-runner ephemeral
          # directory, so effectively no-cache. workflow_dispatch
          # also skips the `docker login ghcr.io` step above (it's
          # gated on `event_name == 'push'`), so registry cache
          # would have no auth to write with anyway. This workflow
          # has no `pull_request` trigger; PRs never run this job.
          BUILDX_CACHE_BACKEND: ${{ github.event_name == 'push' && 'registry' || 'local' }}
        run: |
          uv run python -m tools.image_builder \
            --build-target=${{ matrix.board }} \
            --service=server \
            --service=viewer \
            --service=redis \
            ${{ github.event_name == 'push' && '--push --skip-latest-tag' || '' }}

  # Mirror the immutable <short-hash>-<board> tags pushed by the buildx
  # matrix onto the floating latest-<board> tag. Runs only after every
  # buildx job has succeeded, so latest-* is never advanced from a
  # half-pushed build matrix.
  #
  # Deliberately a single sequential job (no matrix): retags run inside
  # one `set -euo pipefail` block, so a transient registry error stops
  # further retags rather than racing other parallel runners that would
  # blindly continue to advance latest-* on their slice. A preflight
  # checks every <short-hash>-<board> tag is resolvable before any
  # retag fires, so a missing source tag fails the job before it
  # mutates the registry. `imagetools create` re-points the registry
  # tag to the existing manifest without re-uploading layers, and each
  # call is wrapped in 5-attempt exponential backoff so a transient
  # 429 / 5xx doesn't strand latest-* half-mirrored.
  #
  # Two registries: `ghcr.io/screenly/anthias-*` is the new primary
  # (rate-limit-friendly, free unlimited storage for public packages,
  # auth via the workflow-issued GITHUB_TOKEN with `packages: write`).
  # `screenly/anthias-*` on Docker Hub stays in the loop as a parallel
  # mirror during the migration window so devices that haven't yet
  # picked up the compose-template flip keep getting `latest-*`
  # advanced. GHCR is mirrored first so the canonical source is up to
  # date even if Docker Hub flakes on a later retag. The legacy
  # `screenly/srly-ose-*` namespace was dropped: every device that
  # has run `upgrade_containers.sh` since 2023-02 (b9998438) is on
  # `screenly/anthias-*` already, so the parallel `srly-ose-*` push
  # was buying no real back-compat in exchange for half the manifest
  # GETs (one of two reasons d568602's publish hit Docker Hub's 429).
  publish-latest:
    needs: buildx
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    # See `buildx.permissions` above for rationale; same scoping reason.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror short-hash tags to latest-<board>
        run: |
          set -euo pipefail
          GIT_SHORT_HASH=$(git rev-parse --short=7 HEAD)
          BOARDS=(pi2 pi3 pi4-64 pi5 x86)
          SERVICES=(server redis viewer)
          # GHCR first so the canonical primary is current even if the
          # Docker Hub mirror later in the loop flakes.
          NAMESPACES=(ghcr.io/screenly/anthias screenly/anthias)

          # Wrap a registry op in 5 attempts of exponential backoff
          # (2s, 4s, 8s, 16s) so a transient 429 / 5xx doesn't strand
          # `latest-*` half-mirrored. Both `imagetools inspect` and
          # `imagetools create` are idempotent: inspect is read-only,
          # and create overwrites the tag with the same manifest
          # digest on retry.
          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -lt 5 ]; then
                local delay=$((2 ** attempt))
                echo "Attempt ${attempt} failed; retrying in ${delay}s..." >&2
                sleep "${delay}"
              fi
            done
            echo "Giving up after 5 attempts: $*" >&2
            return 1
          }

          echo "::group::Preflight: verify every <short-hash>-<board> source tag exists"
          for namespace in "${NAMESPACES[@]}"; do
            for service in "${SERVICES[@]}"; do
              for board in "${BOARDS[@]}"; do
                src="${namespace}-${service}:${GIT_SHORT_HASH}-${board}"
                echo "Verifying ${src}"
                retry docker buildx imagetools inspect --raw "${src}" >/dev/null
              done
            done
          done
          echo "::endgroup::"

          echo "::group::Mirror <short-hash>-<board> -> latest-<board>"
          for namespace in "${NAMESPACES[@]}"; do
            for service in "${SERVICES[@]}"; do
              for board in "${BOARDS[@]}"; do
                src="${namespace}-${service}:${GIT_SHORT_HASH}-${board}"
                dst="${namespace}-${service}:latest-${board}"
                echo "Mirroring ${src} -> ${dst}"
                retry docker buildx imagetools create -t "${dst}" "${src}"
              done
            done
          done
          echo "::endgroup::"

  balena:
    if: ${{ github.ref == 'refs/heads/master' }}
    needs: buildx
    strategy:
      matrix:
        board: ['pi2', 'pi3', 'pi4-64', 'pi5']
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set Docker tag
        run: |
          {
            echo "GIT_SHORT_HASH=$(git rev-parse --short HEAD)"
            echo "BOARD=${{ matrix.board }}"
            echo "SHM_SIZE=256mb"
          } >> "$GITHUB_ENV"

      - name: Prepare Balena file
        run: |
          # Generate a docker-compose file for Balena with the correct board
          mkdir -p balena-deploy

          # Copy in the Balena yaml file
          cp balena.yml balena-deploy/

          # Generate the docker-compose file
          envsubst < docker-compose.balena.yml.tmpl > balena-deploy/docker-compose.yml

          # Remove bind mounts to `/dev/vchiq` for Raspberry Pi 5
          if [ "${{ matrix.board }}" == "pi5" ]; then
            sed -i '/devices:/ {N; /\n.*\/dev\/vchiq:\/dev\/vchiq/d}' \
              balena-deploy/docker-compose.yml
          fi

      - uses: balena-io/deploy-to-balena-action@638e3085dfe40b8c3cef2a34fe9d0874e572de4e # master
        id: build
        continue-on-error: true
        with:
          balena_token: ${{ secrets.BALENA_TOKEN }}
          fleet: screenly_ose/anthias-${{ matrix.board }}
          source: balena-deploy

      - name: Sleep random sleep before retry
        if: ${{ failure() && steps.build.conclusion == 'failure' }}
        run: |
          sleep $((120 + RANDOM % 900));

      # Balena deploy often fails with 'ESOCKETTIMEDOUT'.
      # This adds some retry logic.
      - uses: balena-io/deploy-to-balena-action@638e3085dfe40b8c3cef2a34fe9d0874e572de4e # master
        id: build-retry
        if: ${{ failure() && steps.build.conclusion == 'failure' }}
        with:
          balena_token: ${{ secrets.BALENA_TOKEN }}
          fleet: screenly_ose/anthias-${{ matrix.board }}
          source: balena-deploy
