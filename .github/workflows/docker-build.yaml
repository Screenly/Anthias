name: Docker Image Build

# Whitelist trigger paths: every entry below is something whose change
# affects either the test outcome or what gets baked into the images.
# We deliberately avoid the "**" + long !exclusion pattern that drifted
# across docker-build / docker-test / generate-openapi-schema. The
# pull_request block below intentionally duplicates the push list —
# actionlint doesn't follow YAML anchors, and a one-line mismatch is
# cheaper than losing CI lint coverage.
on:
  push:
    branches:
      - master
    paths:
      - 'anthias_app/**'
      - 'anthias_django/**'
      - 'api/**'
      - 'lib/**'
      - 'viewer/**'
      - 'static/**'
      - 'templates/**'
      - 'celery_tasks.py'
      - 'host_agent.py'
      - 'manage.py'
      - 'settings.py'
      - 'send_zmq_message.py'
      - 'start_wifi_connect_service.sh'
      - 'tools/**'
      - 'docker/**'
      - 'docker-compose*.yml*'
      - 'balena.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
      - 'ruff.toml'
      - 'tests/**'
      - 'bin/prepare_test_environment.sh'
      - '.github/workflows/docker-build.yaml'
      - '.github/actions/setup-python-uv/**'
  pull_request:
    branches:
      - master
    paths:
      - 'anthias_app/**'
      - 'anthias_django/**'
      - 'api/**'
      - 'lib/**'
      - 'viewer/**'
      - 'static/**'
      - 'templates/**'
      - 'celery_tasks.py'
      - 'host_agent.py'
      - 'manage.py'
      - 'settings.py'
      - 'send_zmq_message.py'
      - 'start_wifi_connect_service.sh'
      - 'tools/**'
      - 'docker/**'
      - 'docker-compose*.yml*'
      - 'balena.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
      - 'ruff.toml'
      - 'tests/**'
      - 'bin/prepare_test_environment.sh'
      - '.github/workflows/docker-build.yaml'
      - '.github/actions/setup-python-uv/**'
  workflow_dispatch:

# Cancel in-flight runs on PR re-pushes (the 35-job buildx matrix is the
# costliest thing in CI). Never cancel master runs — each one is a
# deploy that needs to complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Fast-feedback tests on the host runner. Skip the Docker build so
  # devs see red within ~1-2 min instead of waiting for image build.
  # ────────────────────────────────────────────────────────────────────
  typescript-tests:
    name: TypeScript tests (host)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Run bun test
        run: bun test

  python-unit-tests:
    name: Python unit tests (host)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Native deps required to build cec / netifaces from source —
      # mirrors the apt set in tools/image_builder/__main__.py.
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cec-utils \
            libcec-dev \
            libffi-dev \
            libsystemd-dev

      - name: Set up Python + uv (test deps)
        uses: ./.github/actions/setup-python-uv
        with:
          group: test

      # AnthiasSettings reads ~/.anthias/anthias.conf at import time;
      # use the canonical file so unit tests see realistic defaults
      # rather than the three-empty-section minimal that mypy gets.
      - name: Seed ~/.anthias/anthias.conf
        run: |
          mkdir -p ~/.anthias
          cp ansible/roles/anthias/files/anthias.conf ~/.anthias/anthias.conf

      - name: Run Django unit tests
        run: |
          uv run ./manage.py test \
            --noinput --parallel --exclude-tag=integration

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  python-integration-tests:
    name: Python integration tests (Docker)
    runs-on: ubuntu-24.04
    env:
      COMPOSE_FILE: docker-compose.test.yml
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python + uv (image builder)
        uses: ./.github/actions/setup-python-uv
        with:
          group: docker-image-builder

      - name: Render test Dockerfiles
        run: |
          uv run python -m tools.image_builder \
            --dockerfiles-only \
            --disable-cache-mounts \
            --service celery \
            --service redis \
            --service test

      - name: Start the test stack
        run: docker compose up -d --build

      - name: Prepare integration test environment
        run: |
          docker compose exec anthias-test \
            bash ./bin/prepare_test_environment.sh -s

      - name: Run Django integration tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: |
            docker compose exec anthias-test \
              ./manage.py test --noinput --tag=integration

      - name: Stop the test stack
        if: always()
        run: docker compose down

  # ────────────────────────────────────────────────────────────────────
  # Build + publish. Only on master push — PRs stop after the test jobs.
  # ────────────────────────────────────────────────────────────────────
  buildx:
    needs:
      - typescript-tests
      - python-unit-tests
      - python-integration-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      # Don't cancel sibling jobs on the first failure: any platform that
      # has already finished building its image will have pushed the
      # immutable <short-hash>-<board> tag, which is harmless on its own.
      # Only the publish-latest job below — gated on the entire matrix
      # succeeding — moves the floating latest-* tag, so a partial failure
      # leaves users on the previous coherent latest-* set instead of a
      # half-pushed mix of old + new images.
      fail-fast: false
      matrix:
        board: ['pi1', 'pi2', 'pi3', 'pi4', 'pi4-64', 'pi5', 'x86']
        service: ['server', 'celery', 'redis', 'viewer', 'wifi-connect']
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python + uv (image builder)
        uses: ./.github/actions/setup-python-uv
        with:
          group: docker-image-builder

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Create and use dedicated builder
        run: |
          docker buildx create --use --name multiarch-builder
          docker buildx inspect --bootstrap

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: cache
        with:
          path: /tmp/.buildx-cache/${{ matrix.board }}-${{ matrix.service }}
          key: buildx-${{ matrix.board }}-${{ matrix.service }}-${{ hashFiles('docker/**/*') }}
          restore-keys: |
            buildx-${{ matrix.board }}-${{ matrix.service }}-

      - name: Inspect cache before build
        run: |
          ls -la /tmp/.buildx-cache/${{ matrix.board }}-${{ matrix.service }} || true

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Container
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: |
          uv run python -m tools.image_builder \
            --build-target=${{ matrix.board }} \
            --service=${{ matrix.service }} \
            --push --skip-latest-tag

      - name: Inspect cache after build
        run: |
          ls -la /tmp/.buildx-cache/${{ matrix.board }}-${{ matrix.service }} || true

  # Mirror the immutable <short-hash>-<board> tags pushed by the buildx
  # matrix onto the floating latest-<board> tag. Runs only after every
  # buildx job has succeeded, so latest-* is never advanced from a
  # half-pushed build matrix.
  #
  # Deliberately a single sequential job (no matrix): retags run inside
  # one `set -euo pipefail` block, so a transient registry error stops
  # further retags rather than racing other parallel runners that would
  # blindly continue to advance latest-* on their slice. A preflight
  # checks every <short-hash>-<board> tag is resolvable before any
  # retag fires, so a missing source tag fails the job before it
  # mutates the registry. `imagetools create` re-points the registry
  # tag to the existing manifest without re-uploading layers, so the
  # full ~98 retags (7 boards × 7 services × 2 namespaces) finish in
  # under two minutes.
  publish-latest:
    needs: buildx
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Mirror short-hash tags to latest-<board>
        run: |
          set -euo pipefail
          GIT_SHORT_HASH=$(git rev-parse --short=7 HEAD)
          BOARDS=(pi1 pi2 pi3 pi4 pi4-64 pi5 x86)
          SERVICES=(server celery redis viewer wifi-connect)
          NAMESPACES=(screenly/anthias screenly/srly-ose)

          echo "::group::Preflight: verify every <short-hash>-<board> source tag exists"
          for namespace in "${NAMESPACES[@]}"; do
            for service in "${SERVICES[@]}"; do
              for board in "${BOARDS[@]}"; do
                src="${namespace}-${service}:${GIT_SHORT_HASH}-${board}"
                echo "Verifying ${src}"
                docker buildx imagetools inspect --raw "${src}" >/dev/null
              done
            done
          done
          echo "::endgroup::"

          echo "::group::Mirror <short-hash>-<board> -> latest-<board>"
          for namespace in "${NAMESPACES[@]}"; do
            for service in "${SERVICES[@]}"; do
              for board in "${BOARDS[@]}"; do
                src="${namespace}-${service}:${GIT_SHORT_HASH}-${board}"
                dst="${namespace}-${service}:latest-${board}"
                echo "Mirroring ${src} -> ${dst}"
                docker buildx imagetools create -t "${dst}" "${src}"
              done
            done
          done
          echo "::endgroup::"

  balena:
    needs: buildx
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      matrix:
        board: ['pi1', 'pi2', 'pi3', 'pi4', 'pi5']
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set Docker tag
        run: |
          echo "GIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

          if [ "${{ matrix.board }}" == "pi4" ]; then
            echo "BOARD=${{ matrix.board }}-64" >> "$GITHUB_ENV"
          else
            echo "BOARD=${{ matrix.board }}" >> "$GITHUB_ENV"
          fi

          echo "SHM_SIZE=256mb" >> "$GITHUB_ENV"

      - name: Prepare Balena file
        run: |
          # Generate a docker-compose file for Balena with the correct board
          mkdir -p balena-deploy

          # Copy in the Balena yaml file
          cp balena.yml balena-deploy/

          # Generate the docker-compose file
          envsubst < docker-compose.balena.yml.tmpl > balena-deploy/docker-compose.yml

          # Remove bind mounts to `/dev/vchiq` for Raspberry Pi 5
          if [ "${{ matrix.board }}" == "pi5" ]; then
            sed -i '/devices:/ {N; /\n.*\/dev\/vchiq:\/dev\/vchiq/d}' \
              balena-deploy/docker-compose.yml
          fi

      - uses: balena-io/deploy-to-balena-action@638e3085dfe40b8c3cef2a34fe9d0874e572de4e # master
        id: build
        continue-on-error: true
        with:
          balena_token: ${{ secrets.BALENA_TOKEN }}
          fleet: screenly_ose/anthias-${{ matrix.board }}
          source: balena-deploy

      - name: Sleep random sleep before retry
        if: ${{ failure() && steps.build.conclusion == 'failure' }}
        run: |
          sleep $((120 + RANDOM % 900));

      # Balena deploy often fails with 'ESOCKETTIMEDOUT'.
      # This adds some retry logic.
      - uses: balena-io/deploy-to-balena-action@638e3085dfe40b8c3cef2a34fe9d0874e572de4e # master
        id: build-retry
        if: ${{ failure() && steps.build.conclusion == 'failure' }}
        with:
          balena_token: ${{ secrets.BALENA_TOKEN }}
          fleet: screenly_ose/anthias-${{ matrix.board }}
          source: balena-deploy
