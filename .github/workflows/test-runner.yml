name: Test Runner

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        default: '3.11'
        type: string

jobs:
  run-tests:
    name: Run python tests
    runs-on: ubuntu-24.04
    env:
      COMPOSE_FILE: docker-compose.test.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.17'

      - name: Install dependencies
        run: |
          uv venv
          uv pip install --group docker-image-builder

      - name: Build Containers
        run: |
          uv run python -m tools.image_builder \
            --dockerfiles-only \
            --disable-cache-mounts \
            --service test

      - name: Start the test container
        run: |
          docker compose up -d --build

      - name: Run Python unit tests
        run: |
          docker compose exec anthias-test \
            python -m pytest tests/ -m "not integration" --ignore=tests/test_scheduler.py --ignore=tests/test_viewer.py -x

      - name: Setup integration test environment
        run: |
          docker compose exec anthias-test \
            bash ./bin/prepare_test_environment.sh
          docker compose exec anthias-test \
            python -m django migrate --run-syncdb
          docker compose exec anthias-test \
            python -m django collectstatic --noinput --clear

      - name: Run Python integration tests
        run: |
          docker compose exec anthias-test \
            python -m pytest tests/test_app.py -m integration -v

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Stop the test container
        run: |
          docker compose down
