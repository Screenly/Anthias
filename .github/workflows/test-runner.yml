name: Test Runner

on:
  workflow_call:
    inputs:
      test-type:
        description: 'Type of tests to run (typescript or python)'
        required: true
        type: string
      python-version:
        description: 'Python version to use'
        required: false
        default: '3.13'
        type: string

jobs:
  run-tests:
    name: Run ${{ inputs.test-type }} tests
    runs-on: ubuntu-24.04
    env:
      COMPOSE_FILE: docker-compose.test.yml
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.9.17'

      - name: Install dependencies
        run: |
          uv venv
          uv pip install --group docker-image-builder

      - name: Build Containers
        run: |
          uv run python -m tools.image_builder \
            --dockerfiles-only \
            --disable-cache-mounts \
            --service redis \
            --service test

      - name: Start the test container
        run: |
          docker compose up -d --build

      - name: Run TypeScript tests
        if: inputs.test-type == 'typescript'
        run: |
          docker compose exec anthias-test \
            bun install --frozen-lockfile
          docker compose exec anthias-test \
            bun test

      - name: Run Python unit tests
        if: inputs.test-type == 'python'
        run: |
          docker compose exec anthias-test \
            pytest -n auto -m "not integration" \
              --cov --cov-report=xml --cov-report=term

      - name: Setup integration test environment
        if: inputs.test-type == 'python'
        run: |
          docker compose exec anthias-test \
            bash ./bin/prepare_test_environment.sh -s

      # Snapshot the unit-only `.coverage` before the retry begins.
      # Each retry attempt restores from this snapshot before invoking
      # pytest, so partial line-hit data from a failed earlier attempt
      # cannot leak into the final coverage.xml via `--cov-append`.
      - name: Snapshot unit-only coverage data
        if: inputs.test-type == 'python'
        run: |
          docker compose exec anthias-test \
            cp .coverage .coverage.unit-snapshot

      # ANTHIAS_INTEGRATION_TEST=1 tells anthias_django/settings.py to
      # pin DATABASES.default.TEST.NAME to the same SQLite path the
      # anthias-server container reads. Selenium tests assert on
      # `Asset.objects.all()` after the server persists an upload, so
      # both ends must share one file. Unit tests must NOT set this
      # — they run under xdist and need pytest-django's default
      # per-worker `:memory:` DB to avoid file-lock contention.
      - name: Run Python integration tests
        if: inputs.test-type == 'python'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: |
            docker compose exec anthias-test \
              cp .coverage.unit-snapshot .coverage
            docker compose exec -e ANTHIAS_INTEGRATION_TEST=1 anthias-test \
              pytest -m integration \
                --cov --cov-append --cov-report=xml --cov-report=term

      # The /usr/src/app bind-mount means coverage.xml lands directly on
      # the runner workspace, so no docker cp is needed. Codecov picks it
      # up via the explicit `files:` argument.
      - name: Upload coverage reports to Codecov
        if: inputs.test-type == 'python'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: ./coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Stop the test container
        run: |
          docker compose down
