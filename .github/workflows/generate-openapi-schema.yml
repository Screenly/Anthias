name: Generate OpenAPI Schema

# Same whitelist as docker-build.yaml — schema generation builds the
# same dev images and runs `manage.py spectacular`, so the trigger
# surface is identical to "anything that affects the server image".
on:
  push:
    branches:
      - master
    # Same whitelist as docker-build.yaml — schema generation builds
    # the same dev images and runs `manage.py spectacular`. Inlined
    # twice (push + pull_request) because actionlint doesn't follow
    # YAML anchors.
    paths:
      - 'anthias_app/**'
      - 'anthias_django/**'
      - 'api/**'
      - 'lib/**'
      - 'viewer/**'
      - 'static/**'
      - 'templates/**'
      - 'celery_tasks.py'
      - 'host_agent.py'
      - 'manage.py'
      - 'settings.py'
      - 'send_zmq_message.py'
      - 'tools/**'
      - 'docker/**'
      - 'docker-compose*.yml*'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/generate-openapi-schema.yml'
      - '.github/actions/setup-python-uv/**'
  pull_request:
    branches:
      - master
    paths:
      - 'anthias_app/**'
      - 'anthias_django/**'
      - 'api/**'
      - 'lib/**'
      - 'viewer/**'
      - 'static/**'
      - 'templates/**'
      - 'celery_tasks.py'
      - 'host_agent.py'
      - 'manage.py'
      - 'settings.py'
      - 'send_zmq_message.py'
      - 'tools/**'
      - 'docker/**'
      - 'docker-compose*.yml*'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/generate-openapi-schema.yml'
      - '.github/actions/setup-python-uv/**'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  generate-openapi-schema:
    runs-on: ubuntu-24.04

    env:
      COMPOSE_FILE: docker-compose.dev.yml

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python + uv (image builder)
        uses: ./.github/actions/setup-python-uv
        with:
          group: docker-image-builder

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: cache
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-x86
          restore-keys: |
            ${{ runner.os }}-x86

      - name: Build Images
        run: |
          uv run python -m tools.image_builder \
            --dockerfiles-only \
            --disable-cache-mounts \
            --environment=development
          docker compose build

      - name: Start the Containers
        run: |
          docker compose up -d

      - name: Generate OpenAPI Schema
        run: |
          docker compose exec anthias-server \
            ./manage.py spectacular \
            --format openapi-json \
            --file anthias-api-schema.json

      - name: Upload the OpenAPI Schema
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: anthias-api-schema
          path: anthias-api-schema.json
