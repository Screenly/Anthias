name: Build Balena Disk Images

# Triggered by GitHub release publication (the stable channel — see
# issue #2769) or manually via workflow_dispatch for re-runs of an
# existing release. Master pushes only build/push containers; they
# don't fire this workflow.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Existing release tag to (re)build images for. Must match an
          already-published GitHub release.
        required: true
        type: string

env:
  # Bumped from 22.4.15. Same npm package name (`balena-cli`).
  BALENA_CLI_VERSION: '25.1.3'

jobs:
  # Single source of truth for tag/commit/short-hash so every downstream
  # job derives identical values. Keeps the trigger-specific lookup logic
  # in one place.
  #
  # `if:` filters `release: published` events so only Anthias-core
  # release tags (`v<version>`, e.g. `v2026.05.0`) trigger the
  # pipeline. The build-webview.yaml workflow publishes its own
  # `WebView-v<version>` GitHub releases on tag pushes; without this
  # guard, every webview release would also fire balena OTA deploys
  # and disk-image builds for an unrelated tag. workflow_dispatch
  # always passes through (caller is human, tag is explicit input).
  # All downstream jobs `needs: resolve-context`, so a single skip
  # here cascades through the whole pipeline.
  resolve-context:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' &&
       startsWith(github.event.release.tag_name, 'v'))
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.derive.outputs.tag }}
      short-hash: ${{ steps.derive.outputs.short-hash }}
    steps:
      # Expressions are pulled into env vars rather than substituted
      # inline so the bash heredoc stays free of GitHub-expression
      # interpolation (no quoting traps, no risk of an arbitrary tag
      # name being interpreted as shell). `github.event.inputs.tag`
      # (rather than `inputs.tag`) is the event-payload field, which
      # is null on `release` events — that keeps us out of the
      # `inputs` context, which is only populated for
      # workflow_dispatch/workflow_call.
      - name: Resolve tag from trigger
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 1

      - name: Compute short hash
        id: derive
        run: |
          # `--short=7` pins the abbreviation length so the value
          # always matches the 7-char tags that docker-build.yaml
          # publishes (e.g. `<7-char>-<board>`). Plain `--short` lets
          # git widen the abbreviation when the repo grows, which
          # would silently look up tags that never exist.
          {
            echo "tag=${{ steps.tag.outputs.tag }}"
            echo "short-hash=$(git rev-parse --short=7 HEAD)"
          } >> "$GITHUB_OUTPUT"

  # Verify the GHCR images for the release commit exist before doing
  # anything that mutates fleet state. If a release is cut from a commit
  # that hasn't been built by docker-build.yaml (e.g. a non-master
  # commit, or master before its build finished), fail loudly here so
  # the fleet isn't deployed to with images that aren't in the registry.
  preflight:
    needs: resolve-context
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    steps:
      # ubuntu-24.04 ships Docker + buildx, so no setup needed; manual
      # `docker login` keeps the workflow free of third-party actions.
      - name: Login to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Verify all <short-hash>-<board> images exist in GHCR
        env:
          SHORT_HASH: ${{ needs.resolve-context.outputs.short-hash }}
        run: |
          set -euo pipefail
          missing=()
          for board in pi2 pi3 pi4-64 pi5 x86; do
            for service in server viewer redis; do
              ref="ghcr.io/screenly/anthias-${service}:${SHORT_HASH}-${board}"
              if ! docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
                missing+=("$ref")
              fi
            done
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GHCR images for release commit ${SHORT_HASH}:"
            printf '  %s\n' "${missing[@]}"
            echo "Cut the release from a master commit whose docker-build.yaml run has finished, or run docker-build.yaml manually first." >&2
            exit 1
          fi

  generate-openapi-schema:
    needs: resolve-context
    uses: ./.github/workflows/generate-openapi-schema.yml
    with:
      ref: ${{ needs.resolve-context.outputs.tag }}
    permissions:
      contents: write

  # Push the docker-compose pinned to <short-hash>-<board> images to the
  # board's balena fleet. This is the "OTA stable channel" half of the
  # release: existing fleet devices auto-update to this commit.
  # Replaces the deprecated balena-io/deploy-to-balena-action with
  # direct balena-cli calls so the toolchain is current.
  balena-cloud-deploy:
    needs: [resolve-context, preflight]
    strategy:
      fail-fast: false
      matrix:
        board: ['pi2', 'pi3', 'pi4-64', 'pi5', 'x86']
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-context.outputs.tag }}

      # Install balena-cli via npm rather than bun: balena-cli depends
      # on native modules (drivelist for `balena preload`, the
      # compose-parser Go binary for `balena deploy`) whose `install`
      # / `postinstall` lifecycle scripts bun blocks by default. The
      # blocked binaries surface much later as misleading runtime
      # errors ("Unexpected end of JSON input" parsing compose,
      # `drivelist.node` ENOENT in preload). npm runs them inline.
      # Node 20 ships with ubuntu-24.04; balena-cli 25 prefers
      # Node 24+ but the warning is cosmetic for the commands used
      # here (deploy / os / preload all worked on Node 22 locally).
      - name: Install balena CLI
        run: npm install -g "balena-cli@${{ env.BALENA_CLI_VERSION }}"

      - name: Login to balena
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_TOKEN }}
        run: balena login --token "$BALENA_TOKEN"

      # FLEET_SLUG + BOARD feed the host-config reconcile below; the
      # deploy step derives the fleet itself inside balena_ota_deploy.sh.
      - name: Resolve fleet slug + env vars
        run: |
          case "${{ matrix.board }}" in
            pi2)    FLEET=anthias-pi2 ;;
            pi3)    FLEET=anthias-pi3 ;;
            pi4-64) FLEET=anthias-pi4 ;;
            pi5)    FLEET=anthias-pi5 ;;
            x86)    FLEET=anthias-x86 ;;
          esac
          {
            echo "FLEET_SLUG=$FLEET"
            echo "BOARD=${{ matrix.board }}"
          } >> "$GITHUB_ENV"

      # Reconcile the fleet's config.txt knobs to balena-host-config.json.
      # This is the IAC home for settings previously hand-edited in the
      # dashboard, and the file is authoritative: we upsert every listed key
      # under the canonical BALENA_ prefix, then prune any config var not in
      # the file (including legacy RESIN_HOST_CONFIG_* duplicates). That is
      # what fixes issue #2947 — the Pi 4 fleet had a malformed, quote-
      # wrapped `dtoverlay="vc4-kms-v3d"` that stopped full KMS loading, so
      # the viewer's eglfs_kms renderer (since #2905) couldn't start the
      # display. Supervisor vars (RESIN_SUPERVISOR_*) are not config.txt and
      # are deliberately left untouched. `balena env set` is idempotent.
      - name: Apply fleet host configuration
        run: |
          set -euo pipefail
          slug="screenly_ose/$FLEET_SLUG"

          # Resolve this board's desired config in one shot, and HARD-FAIL if
          # the board key is absent or the file doesn't parse. Without this,
          # an empty desired set makes the prune below delete every config
          # var on the fleet (incl. dtoverlay=vc4-kms-v3d) — a fleet-wide
          # #2947. `jq -e` exits non-zero on null (missing board) or a parse
          # error; the command substitution under `set -e` then aborts. A
          # board declared as `{}` (e.g. x86) is a truthy object, so it
          # passes the guard and correctly reconciles to "no config.txt".
          if ! board_json=$(jq -ec --arg b "$BOARD" '.boards[$b]' \
              balena-host-config.json); then
            echo "::error::balena-host-config.json: board '$BOARD' is not declared (or the file is invalid) — refusing to reconcile, the prune would wipe the fleet" >&2
            exit 1
          fi

          mapfile -t desired < <(printf '%s' "$board_json" | jq -r 'keys[]')
          is_desired() {
            local k="$1" d
            for d in "${desired[@]}"; do [ "$d" = "$k" ] && return 0; done
            return 1
          }

          # 1) Upsert each desired key under the canonical BALENA_ prefix.
          while IFS=$'\t' read -r key value; do
            [ -n "$key" ] || continue
            echo "set BALENA_HOST_CONFIG_$key=$value on $slug"
            balena env set "BALENA_HOST_CONFIG_$key" "$value" --fleet "$slug"
          done < <(printf '%s' "$board_json" \
            | jq -r 'to_entries[] | "\(.key)\t\(.value)"')

          # 2) Prune so the file is authoritative: drop every legacy
          #    RESIN_HOST_CONFIG_* and any BALENA_HOST_CONFIG_* whose key is
          #    not in the file. The regex is ANCHORED so only true config.txt
          #    vars match — a var merely containing "HOST_CONFIG" (or
          #    supervisor vars) is never touched. Capture the listing into a
          #    var first so a balena/jq failure aborts the step (pipefail
          #    does not propagate out of a process substitution) rather than
          #    silently skipping the prune and leaving a stale duplicate.
          host_vars=$(balena env list --fleet "$slug" --config --json \
            | jq -r '.[] | select(.name|test("^(BALENA|RESIN)_HOST_CONFIG_"))
                     | "\(.id)\t\(.name)"')
          while IFS=$'\t' read -r id name; do
            [ -n "$id" ] || continue
            suffix="${name#*_HOST_CONFIG_}"
            if [[ "$name" == RESIN_HOST_CONFIG_* ]]; then
              echo "rm legacy $name (id $id) on $slug"
              balena env rm "$id" --config --yes
            elif ! is_desired "$suffix"; then
              echo "rm unmanaged $name (id $id) on $slug"
              balena env rm "$id" --config --yes
            fi
          done <<< "$host_vars"

      # `balena deploy` (vs `balena push`) points the fleet at the
      # existing <short-hash>-<board> GHCR images — no remote build.
      # bin/balena_ota_deploy.sh owns the fleet mapping, compose render
      # (incl. the pi5/x86 vchiq strip), version stamping, and retry;
      # the manual deploy hook (deploy-balena-manual.yaml) calls the same
      # script. `${TAG#v}` strips the leading `v` so the release tag
      # (v2026.05.1) becomes the raw CalVer the script normalizes and
      # stamps into balena.yml — so the fleet's Releases page shows our
      # real version instead of 0.0.0+revN.
      - name: Deploy to balena fleet
        env:
          TAG: ${{ needs.resolve-context.outputs.tag }}
          SHORT_HASH: ${{ needs.resolve-context.outputs.short-hash }}
        run: |
          bin/balena_ota_deploy.sh \
            "${{ matrix.board }}" "${TAG#v}" "$SHORT_HASH"

  # Download balena OS, preload with the fleet's `latest` (the commit
  # we just pushed in balena-cloud-deploy), package as .img.zst, and
  # emit per-board metadata used to build rpi-imager.json.
  balena-build-images:
    needs: [resolve-context, balena-cloud-deploy]
    strategy:
      fail-fast: false
      matrix:
        board: ['pi2', 'pi3', 'pi4-64', 'pi5', 'x86']
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-context.outputs.tag }}

      - name: Install zstd
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      # See balena-cloud-deploy's "Install balena CLI" step for why
      # this uses npm rather than bun.
      - name: Install balena CLI
        run: npm install -g "balena-cli@${{ env.BALENA_CLI_VERSION }}"

      - name: Login to balena
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_TOKEN }}
        run: balena login --token "$BALENA_TOKEN"

      - name: Resolve image + fleet slug
        run: |
          case "${{ matrix.board }}" in
            pi2)
              echo "BALENA_IMAGE=raspberry-pi2" >> "$GITHUB_ENV"
              echo "FLEET_SLUG=anthias-pi2" >> "$GITHUB_ENV"
              ;;
            pi3)
              echo "BALENA_IMAGE=raspberrypi3" >> "$GITHUB_ENV"
              echo "FLEET_SLUG=anthias-pi3" >> "$GITHUB_ENV"
              ;;
            pi4-64)
              echo "BALENA_IMAGE=raspberrypi4-64" >> "$GITHUB_ENV"
              echo "FLEET_SLUG=anthias-pi4" >> "$GITHUB_ENV"
              ;;
            pi5)
              echo "BALENA_IMAGE=raspberrypi5" >> "$GITHUB_ENV"
              echo "FLEET_SLUG=anthias-pi5" >> "$GITHUB_ENV"
              ;;
            x86)
              # generic-amd64 is balena's GPT-boot generic x86_64
              # device type (the screenly_ose/anthias-x86 fleet is
              # provisioned for this slug, not the older MBR-boot
              # genericx86-64-ext). Mismatching the two yields
              # "The device type of the provided OS image …, does
              # not match the expected device type …" at
              # `balena os configure` time.
              echo "BALENA_IMAGE=generic-amd64" >> "$GITHUB_ENV"
              echo "FLEET_SLUG=anthias-x86" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Download OS image
        # `--version` accepts an explicit version, a semver range,
        # `latest`, `menu`, or `menu-esr` in balena-cli 25.x; the
        # `default` keyword that worked under balena-cli 22.x was
        # removed ("Version default is not available for ...").
        run: |
          balena os download "$BALENA_IMAGE" \
            --output "$BALENA_IMAGE.img" \
            --version latest

      - name: Preload OS image
        run: |
          balena preload \
            "$BALENA_IMAGE.img" \
            --fleet "screenly_ose/$FLEET_SLUG" \
            --splash-image ansible/roles/splashscreen/files/splashscreen.png \
            --commit latest

      - name: Configure OS image
        run: |
          balena os configure \
            "$BALENA_IMAGE.img" \
            --config-network=ethernet \
            --fleet "screenly_ose/$FLEET_SLUG"

      - name: Package up image
        env:
          BOARD: ${{ matrix.board }}
        run: |
          # Capture BUILD_DATE once so every filename and metadata
          # field references the same date, even if the step happens
          # to span UTC midnight.
          BUILD_DATE=$(date -I)
          # Final artefacts embed the board slug rather than balena's
          # image name (which is `raspberry-pi2` / `raspberrypi3` /
          # `raspberrypi4-64` / `raspberrypi5` — inconsistently
          # hyphenated). The `anthias-<board>.img.zst` shape matches
          # the regex in tools/raspberry_pi_imager/build_pi_imager_json
          # so the consolidation step can route entries by board.
          ARTIFACT="$BUILD_DATE-anthias-$BOARD"

          # Hash + size each large artefact exactly once and reuse
          # the values for both the .sha256 sidecar and the JSON
          # metadata snippet. Hashing a multi-GB image is the
          # dominant cost in this step, and it used to run twice per
          # file (once for the sidecar, once inline in jq) — so this
          # halves the wall-clock time of the package step.
          IMAGE_SHA256=$(sha256sum "$BALENA_IMAGE.img" | awk '{print $1}')
          IMAGE_SIZE=$(wc -c < "$BALENA_IMAGE.img")

          zstd -19 -T0 "$BALENA_IMAGE.img" -o "$ARTIFACT.img.zst"
          DOWNLOAD_SHA256=$(sha256sum "$ARTIFACT.img.zst" | awk '{print $1}')
          DOWNLOAD_SIZE=$(wc -c < "$ARTIFACT.img.zst")

          # Match the format `sha256sum` would have written so the
          # sidecar is a drop-in input to `sha256sum -c`. The
          # uncompressed line uses `$ARTIFACT.img` (not the local
          # intermediate `$BALENA_IMAGE.img`) because that's the
          # filename a user gets when they decompress with
          # `zstd -d $ARTIFACT.img.zst` — the local name is a
          # CI-internal artefact that the release asset never carries.
          {
            printf '%s  %s\n' "$IMAGE_SHA256" "$ARTIFACT.img"
            printf '%s  %s\n' "$DOWNLOAD_SHA256" "$ARTIFACT.img.zst"
          } > "$ARTIFACT.sha256"

          # Per-board metadata snippet, uploaded to the release
          # alongside the .img.zst it describes.
          # build_pi_imager_json.py fetches it via the same base name
          # (s/.img.zst$/.json/) and consolidates into rpi-imager.json.
          jq --null-input \
            --arg BOARD "$BOARD" \
            --arg IMAGE_SHA256 "$IMAGE_SHA256" \
            --argjson IMAGE_SIZE "$IMAGE_SIZE" \
            --arg DOWNLOAD_SHA256 "$DOWNLOAD_SHA256" \
            --argjson DOWNLOAD_SIZE "$DOWNLOAD_SIZE" \
            --arg RELEASE_DATE "$BUILD_DATE" \
            '{
              "name": ("Anthias (" + $BOARD + ")"),
              "description": "Anthias, formerly known as Screenly OSE, is the most popular open source digital signage project in the world.",
              "icon": "https://anthias.screenly.io/img/anthias-icon.svg",
              "website": "https://anthias.screenly.io",
              "extract_size": $IMAGE_SIZE,
              "extract_sha256": $IMAGE_SHA256,
              "image_download_size": $DOWNLOAD_SIZE,
              "image_download_sha256": $DOWNLOAD_SHA256,
              "release_date": $RELEASE_DATE
            }' > "$ARTIFACT.json"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: balena-images-${{ matrix.board }}
          path: |
            ./*-anthias-*.img.zst
            ./*-anthias-*.sha256
            ./*-anthias-*.json

      - name: Attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: '${{ github.workspace }}/*-anthias-*.img.zst'

  # Phase 1 release upload: ensure the release exists, then attach the
  # disk images, per-board metadata snippets, OpenAPI schema, and the
  # docker-tag pointer file. The per-board snippets need to be on the
  # release before the build-rpi-imager-json job runs because
  # tools/raspberry_pi_imager/build_pi_imager_json.py reads them back
  # via the GitHub API.
  upload-release-assets:
    needs:
      - resolve-context
      - generate-openapi-schema
      - balena-build-images
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-context.outputs.tag }}

      - name: Download OpenAPI schema
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: anthias-api-schema
          path: assets

      - name: Download balena images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: balena-images-*
          path: assets
          merge-multiple: true

      - name: Write docker-tag asset
        env:
          SHORT_HASH: ${{ needs.resolve-context.outputs.short-hash }}
        run: |
          printf '%s\n' "$SHORT_HASH" > assets/docker-tag

      # The workflow_dispatch input contract requires the release to
      # already exist (the release event always satisfies that on its
      # own trigger). Failing loudly here keeps a manual run from
      # publishing a fresh release — and OTA-deploying fleets — from
      # an unintended tag/commit.
      - name: Verify release exists, then upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-context.outputs.tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG does not exist. Create it (Releases → Draft a new release) before running this workflow." >&2
            exit 1
          fi

          ls -la assets
          gh release upload "$TAG" assets/* --clobber

  # Phase 2 release upload: with per-board snippets now on the release,
  # invoke the existing tools/raspberry_pi_imager/build_pi_imager_json
  # generator (which queries the GitHub API for the release's assets)
  # and attach the consolidated rpi-imager.json. RELEASE_TAG bypasses
  # the script's `/releases/latest` lookup so prereleases work too.
  build-rpi-imager-json:
    needs: [resolve-context, upload-release-assets]
    runs-on: ubuntu-24.04
    # `contents: write` is for `gh release upload`; `actions: write` is
    # for the `gh workflow run deploy-website.yaml` fan-out at the end
    # of this job (Actions API call, not a contents-touching op).
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-context.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install requests
        run: pip install 'requests==2.33.1'

      - name: Generate rpi-imager.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-context.outputs.tag }}
        run: |
          python -m tools.raspberry_pi_imager.build_pi_imager_json \
            > rpi-imager.json
          jq . rpi-imager.json

      - name: Upload rpi-imager.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-context.outputs.tag }}
        run: |
          gh release upload "$TAG" rpi-imager.json --clobber

      # Now that rpi-imager.json is on the release, fan out to the
      # website-deploy workflow. We trigger explicitly from here
      # rather than letting deploy-website react to release:published
      # — that would race this job's upload step and ship an empty
      # os_list for the brief window before the asset exists.
      # `--ref` must point at a branch the workflow file lives on;
      # the repo's default branch is the canonical home.
      - name: Trigger website deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run deploy-website.yaml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$DEFAULT_BRANCH"
