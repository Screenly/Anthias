name: Build Webview

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-webview.yaml'
      - 'webview/**'
      - '!webview/README.md'
    tags:
      - 'WebView-v*'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/build-webview.yaml'
      - 'webview/**'
      - '!webview/README.md'

jobs:
  build-docker-image:
    name: Build Docker Images (Pi 1-4)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        if: success() && github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set buildx arguments
        if: github.event_name != 'pull_request'
        id: prepare
        run: |
          GIT_SHORT_HASH=$(git rev-parse --short HEAD)

          {
            echo "buildx_args=--cache-from \"screenly/ose-qt-builder:latest\" \
            --output \"type=image,push=true\" \
            --build-arg \"BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')\" \
            --build-arg \"GIT_HASH=$GIT_SHORT_HASH\" \
            --build-arg \"GIT_SHORT_HASH=$GIT_SHORT_HASH\" \
            --build-arg \"GIT_BRANCH=$GITHUB_REF_NAME\""
          } >> "$GITHUB_OUTPUT"

      - name: Building container
        if: github.event_name != 'pull_request'
        run: |
          cd webview
          docker buildx build \
            ${{ steps.prepare.outputs.buildx_args }} \
            -t screenly/ose-qt-builder:latest .

  compile-webview-part-1:
    name: Compile Webview (Pi 1-4 / Qt 5)
    needs: build-docker-image
    strategy:
      matrix:
        board: ['pi1', 'pi2', 'pi3', 'pi4']
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Cache build layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: cache
        with:
          path: /tmp/.cache
          key: ${{ runner.os }}-webview-${{ matrix.board }}
          restore-keys: |
            ${{ runner.os }}-webview-${{ matrix.board }}

      - name: Build ccache
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          # Unclear why this is needed
          mkdir -p /tmp/.cache
          wget -q https://storage.googleapis.com/ose-lab/cache.tgz
          tar xfz cache.tgz -C /tmp/.cache
          ls -lah /tmp/.cache

      - name: Derive WEBVIEW_VERSION
        run: |
          # WebView-v2026.04.0 → 2026.04.0 on tag pushes; date-stamped
          # dev version otherwise so artifact names are still well-formed.
          if [[ "$GITHUB_REF" == refs/tags/WebView-v* ]]; then
            echo "WEBVIEW_VERSION=${GITHUB_REF#refs/tags/WebView-v}" >> "$GITHUB_ENV"
          else
            echo "WEBVIEW_VERSION=$(date -u +%Y.%m).0-dev" >> "$GITHUB_ENV"
          fi

      - name: Start compilation
        shell: 'script -q -e -c "bash {0}"'
        run: |
          cd webview
          docker run -itd \
            --name qt-builder \
            -v ~/tmp/qt-src:/src:Z \
            -v /tmp/.cache/ccache:/src/ccache:Z \
            -v ~/tmp/qt-build:/build:Z \
            -v $(pwd):/webview:ro \
            -e TARGET=${{ matrix.board }} \
            -e WEBVIEW_VERSION="$WEBVIEW_VERSION" \
            screenly/ose-qt-builder:latest
          docker exec -it qt-builder /webview/build_webview_with_qt5.sh
          docker rm -f qt-builder

      - name: Copy build artifacts
        run: |
          mkdir -p ./build
          cp ~/tmp/qt-build/webview-*.tar.gz \
            ~/tmp/qt-build/webview-*.tar.gz.sha256 \
            ~/tmp/qt-build/qt5-*.tar.gz \
            ~/tmp/qt-build/qt5-*.tar.gz.sha256 \
            ./build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webview-${{ matrix.board }}
          path: ~/tmp/qt-build/

  compile-webview-part-2:
    name: Compile Webview (Qt 6 / aqt)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        board: ['pi5', 'pi4-64', 'x86']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set environment variables
        run: |
          # WebView-v2026.04.0 → 2026.04.0 on tag pushes; date-stamped
          # dev version otherwise so artifact names are still well-formed.
          if [[ "$GITHUB_REF" == refs/tags/WebView-v* ]]; then
            WEBVIEW_VERSION="${GITHUB_REF#refs/tags/WebView-v}"
          else
            WEBVIEW_VERSION="$(date -u +%Y.%m).0-dev"
          fi

          {
            echo "WEBVIEW_VERSION=$WEBVIEW_VERSION"
            echo "COMPOSE_PROFILES=${{ matrix.board }}"
            echo "COMPOSE_BAKE=true"
          } >> "$GITHUB_ENV"

      - name: Build Docker Image
        run: |
          cd webview
          docker compose build

      - name: Prepare bind-mount target for non-root builder user
        run: |
          # The Qt 6 builder containers run as a non-root `builder` user
          # (UID 1000); the bind-mounted ~/tmp-${board}/build is created
          # by dockerd as root on first use, which the container UID
          # cannot write to. Pre-create it with permissive mode so the
          # container can mkdir /build/release and friends regardless
          # of the runner's host UID.
          mkdir -p ~/tmp-${{ matrix.board }}/build
          chmod 777 ~/tmp-${{ matrix.board }}/build

      - name: Compile WebView
        run: |
          cd webview
          docker compose run \
            -e WEBVIEW_VERSION="$WEBVIEW_VERSION" \
            builder-${{ matrix.board }} /scripts/build_webview.sh

      - name: Copy build artifacts
        run: |
          mkdir -p ./build
          cp ~/tmp-${{ matrix.board }}/build/release/webview-*.tar.gz \
            ~/tmp-${{ matrix.board }}/build/release/webview-*.tar.gz.sha256 \
            ./build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webview-${{ matrix.board }}
          path: ./build

  create-releases:
    name: Create a Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - compile-webview-part-1
      - compile-webview-part-2
    strategy:
      matrix:
        board: ['pi1', 'pi2', 'pi3', 'pi4', 'pi4-64', 'pi5', 'x86']
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: webview-${{ matrix.board }}
          path: ./build
      - name: Create a release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          prerelease: true
          files: |
            build/webview-*.tar.gz
            build/webview-*.tar.gz.sha256
            build/qt5-*.tar.gz
            build/qt5-*.tar.gz.sha256
