name: Deploy Anthias.screenly.io

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-website.yaml'
      - 'website/**'
      - 'tools/raspberry_pi_imager/**'

  # Re-deploy the marketing site whenever a release is published — the
  # build-balena-disk-image workflow's final step creates the GitHub
  # release with the new *.img.zst artefacts, so by the time this fires
  # the assets are queryable from the GitHub API and rpi-imager.json
  # picks them up. `prereleases` are included intentionally because
  # build-balena-disk-image.yaml currently flags every release as
  # prerelease=true.
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.13'
  HUGO_VERSION: '0.157.0'
  UV_VERSION: '0.7.12'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Run rpi-imager tests
        run: uv run --no-dev --group website -m pytest --confcutdir=tools/raspberry_pi_imager tools/raspberry_pi_imager/tests/ -v

  # Build job
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install Hugo
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          sudo dpkg -i hugo.deb
          rm hugo.deb
          hugo version

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      - name: Build website CSS
        run: bun run css:build
        working-directory: website

      - name: Build website
        run: hugo --source website --minify

      - name: Build Raspberry Pi Imager JSON
        run: uv run --no-dev --group website python -m tools.raspberry_pi_imager.build_pi_imager_json > website/public/rpi-imager.json
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate rpi-imager.json
        run: |
          # Syntax check
          jq . < website/public/rpi-imager.json > /dev/null

          # Must have os_list array
          jq -e '.os_list | type == "array"' < website/public/rpi-imager.json > /dev/null

          # Each entry must have required fields. jq's has() takes one
          # key at a time, so iterate the required-key list with `all`.
          jq -e '
            .os_list[] as $entry
            | ["name","description","icon","website","url","extract_size","extract_sha256","image_download_size","image_download_sha256","release_date"]
            | all(. as $k | $entry | has($k))
          ' < website/public/rpi-imager.json > /dev/null

          # Sizes must be numbers, not strings
          jq -e '.os_list[] | (.extract_size | type == "number") and (.image_download_size | type == "number")' < website/public/rpi-imager.json > /dev/null

          # No pi1 entries
          jq -e '[.os_list[] | .name | test("pi1")] | any | not' < website/public/rpi-imager.json > /dev/null

          # All URLs must be HTTPS
          jq -e '[.os_list[] | .url | startswith("https://")] | all' < website/public/rpi-imager.json > /dev/null

          echo "rpi-imager.json validation passed"

      - name: Show build output
        run: find website/public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
