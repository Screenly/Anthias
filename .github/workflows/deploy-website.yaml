name: Deploy Anthias.screenly.io

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-website.yaml'
      - 'website/**'

  # Re-deploy the marketing site when a release is published. The
  # release workflow (build-balena-disk-image.yaml) attaches the
  # consolidated rpi-imager.json as a release asset; the build job
  # fetches it (by tag on release-triggered runs, latest otherwise)
  # and Hugo serves it as a static file at /rpi-imager.json.
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.13'
  HUGO_VERSION: '0.157.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install Hugo
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          sudo dpkg -i hugo.deb
          rm hugo.deb
          hugo version

      # Manual bun install — same toolchain we use elsewhere in the
      # repo. The script verifies the archive's SHA-256 against the
      # release's SHASUMS256.txt before installing, avoiding the
      # remote-script execution of `curl bun.sh/install | bash`.
      - name: Install bun
        run: bash .github/workflows/scripts/install-bun.sh

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      - name: Build website CSS
        run: bun run css:build
        working-directory: website

      - name: Build website
        run: hugo --source website --minify

      # Fetch rpi-imager.json from the GitHub release. The file is
      # built by build-balena-disk-image.yaml at release time and
      # served at /rpi-imager.json.
      #
      # On release-triggered runs we pin to the release that fired
      # this workflow (github.event.release.tag_name) so the website
      # always matches what was just published — even if the release
      # is flagged as prerelease, in which case `latest` would skip
      # it. Push/manual runs pull from the latest release.
      #
      # We probe the release with `gh release view` first so that we
      # can distinguish "release exists but asset is missing" (the
      # transition fallback path; expected immediately after this
      # refactor lands) from transient errors (auth/rate-limit/
      # network), which must fail the deploy rather than silently
      # ship an empty os_list.
      - name: Fetch rpi-imager.json from release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p website/public
          out=website/public/rpi-imager.json

          if [ -n "${RELEASE_TAG:-}" ]; then
            target=( "$RELEASE_TAG" )
            label="release $RELEASE_TAG"
          else
            target=()
            label="latest release"
          fi

          assets=$(gh release view "${target[@]}" \
            --repo Screenly/Anthias \
            --json assets \
            --jq '[.assets[].name]')
          if echo "$assets" | jq -e 'index("rpi-imager.json")' > /dev/null; then
            gh release download "${target[@]}" \
              --pattern rpi-imager.json \
              --dir website/public \
              --repo Screenly/Anthias \
              --clobber
            echo "Fetched rpi-imager.json from $label"

            # Stronger validation than just `jq .`: catches a release
            # asset that's well-formed JSON but missing required
            # fields or carries the wrong types. Mirrors the checks
            # the old in-workflow regen step ran before this file
            # moved to being a release asset.
            jq -e '.os_list | type == "array"' "$out" > /dev/null
            jq -e '
              .os_list[] as $entry
              | ["name","description","icon","website","url",
                 "extract_size","extract_sha256","image_download_size",
                 "image_download_sha256","release_date"]
              | all(. as $k | $entry | has($k))
            ' "$out" > /dev/null
            jq -e '.os_list[] |
              (.extract_size | type == "number") and
              (.image_download_size | type == "number")' "$out" > /dev/null
            jq -e '[.os_list[] | .name | test("pi1")] | any | not' "$out" > /dev/null
            jq -e '[.os_list[] | .url | startswith("https://")] | all' "$out" > /dev/null
            echo "rpi-imager.json validation passed"
          else
            echo "::warning::$label has no rpi-imager.json asset; shipping empty os_list."
            printf '%s\n' '{"os_list": []}' > "$out"
          fi

      - name: Show build output
        run: find website/public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
