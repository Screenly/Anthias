name: Deploy Anthias.screenly.io

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-website.yaml'
      - 'website/**'

  # Re-deploy the marketing site when a release is published. The
  # release workflow (build-balena-disk-image.yaml) attaches the
  # consolidated rpi-imager.json as a release asset; the build job
  # fetches it (by tag on release-triggered runs, latest otherwise)
  # and Hugo serves it as a static file at /rpi-imager.json.
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.13'
  HUGO_VERSION: '0.157.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install Hugo
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          sudo dpkg -i hugo.deb
          rm hugo.deb
          hugo version

      # Manual bun install — same toolchain we use elsewhere in the
      # repo. Avoids third-party setup actions.
      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      - name: Build website CSS
        run: bun run css:build
        working-directory: website

      - name: Build website
        run: hugo --source website --minify

      # Fetch rpi-imager.json from the GitHub release. The file is
      # built by build-balena-disk-image.yaml at release time and
      # served at /rpi-imager.json.
      #
      # On release-triggered runs we pin to the release that fired this
      # workflow (github.event.release.tag_name) so the website always
      # matches what was just published — even if the release is
      # flagged as prerelease, in which case `latest` would skip it.
      # Push/manual runs pull from the latest release. Falls back to
      # an empty os_list if no matching asset is available yet (first
      # run after this refactor lands; safe to remove the fallback
      # once one new-format release exists).
      - name: Fetch rpi-imager.json from release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p website/public
          if [ -n "${RELEASE_TAG:-}" ]; then
            target=( "$RELEASE_TAG" )
            label="release $RELEASE_TAG"
          else
            target=()
            label="latest release"
          fi
          if gh release download "${target[@]}" \
              --pattern rpi-imager.json \
              --dir website/public \
              --repo Screenly/Anthias \
              --clobber 2>/dev/null; then
            echo "Fetched rpi-imager.json from $label"
            jq . website/public/rpi-imager.json > /dev/null
          else
            echo "::warning::No rpi-imager.json on $label; shipping empty os_list."
            printf '%s\n' '{"os_list": []}' > website/public/rpi-imager.json
          fi

      - name: Show build output
        run: find website/public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
