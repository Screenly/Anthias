name: Deploy Anthias.screenly.io

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-website.yaml'
      - '.github/workflows/scripts/install-bun.sh'
      - 'website/**'

  # Re-deploy when a release is cut: build-balena-disk-image.yaml
  # invokes this workflow via `gh workflow run` after it finishes
  # uploading rpi-imager.json to the release, so this job is
  # guaranteed to see the freshly-published asset (and won't ship an
  # empty os_list while the upload step is still in flight).
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.13'
  HUGO_VERSION: '0.157.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install Hugo
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          sudo dpkg -i hugo.deb
          rm hugo.deb
          hugo version

      # Manual bun install — same toolchain we use elsewhere in the
      # repo. The script verifies the archive's SHA-256 against the
      # release's SHASUMS256.txt before installing, avoiding the
      # remote-script execution of `curl bun.sh/install | bash`.
      - name: Install bun
        run: bash .github/workflows/scripts/install-bun.sh

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      # Pull the high-DPI marketing captures produced by the
      # marketing-screenshots.yaml workflow. The home-page slider's
      # Hugo partial enumerates *.png entries from
      # website/assets/images/screenshots/ — the files are
      # gitignored, so this step is the canonical source on every
      # deploy. We resolve the latest *successful* run on master
      # (not by ref of the current deploy, because deploy-website is
      # triggered on master pushes and we want the most recent green
      # capture set regardless of which commit shipped it last).
      #
      # Missing run is a soft fail: the site builds with an empty
      # screenshots/ dir and the layout falls back gracefully (no
      # slider section, OG image falls back to logo.svg). That keeps
      # the first deploy after this change from being blocked by an
      # ordering chicken-and-egg.
      - name: Fetch marketing screenshots
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dest=website/assets/images/screenshots
          mkdir -p "$dest"
          run_id=$(gh run list \
            --workflow=marketing-screenshots.yaml \
            --branch=master \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -z "$run_id" ]; then
            echo "::warning::No successful marketing-screenshots run found on master; building without slider."
            exit 0
          fi
          echo "Fetching marketing-screenshots artifact from run $run_id"
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          gh run download "$run_id" \
            --name marketing-screenshots \
            --dir "$tmp"
          # Copy PNGs only; ignore any unexpected sidecar files so
          # the layout can trust *everything* in the dir to be a
          # capture.
          find "$tmp" -maxdepth 1 -type f -name '*.png' -exec cp {} "$dest/" \;
          echo "Installed $(ls "$dest" | wc -l) screenshot files"
          ls -1 "$dest"

      - name: Build website CSS
        run: bun run css:build
        working-directory: website

      - name: Build website
        run: hugo --source website --minify

      # Fetch rpi-imager.json from the latest GitHub release. The
      # file is built by build-balena-disk-image.yaml at release time
      # and Hugo serves it at /rpi-imager.json.
      #
      # We probe with `gh release view --json assets` first so we can
      # distinguish "release exists but asset is missing" (transition
      # fallback path; expected immediately after this refactor
      # lands) from transient errors (auth/rate-limit/network), which
      # must fail the deploy rather than silently ship an empty
      # os_list.
      - name: Fetch rpi-imager.json from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p website/public
          out=website/public/rpi-imager.json

          assets=$(gh release view \
            --json assets \
            --jq '[.assets[].name]')
          if echo "$assets" | jq -e 'index("rpi-imager.json")' > /dev/null; then
            gh release download \
              --pattern rpi-imager.json \
              --dir website/public \
              --clobber
            echo "Fetched rpi-imager.json from latest release"

            # Stronger validation than just `jq .`: catches a release
            # asset that's well-formed JSON but missing required
            # fields or carries the wrong types. Mirrors the checks
            # the old in-workflow regen step ran before this file
            # moved to being a release asset.
            jq -e '.os_list | type == "array"' "$out" > /dev/null
            jq -e '
              .os_list[] as $entry
              | ["name","description","icon","website","url",
                 "extract_size","extract_sha256","image_download_size",
                 "image_download_sha256","release_date"]
              | all(. as $k | $entry | has($k))
            ' "$out" > /dev/null
            jq -e '.os_list[] |
              (.extract_size | type == "number") and
              (.image_download_size | type == "number")' "$out" > /dev/null
            jq -e '[.os_list[] | .name | test("pi1")] | any | not' "$out" > /dev/null
            jq -e '[.os_list[] | .url | startswith("https://")] | all' "$out" > /dev/null
            echo "rpi-imager.json validation passed"
          else
            echo "::warning::Latest release has no rpi-imager.json asset; shipping empty os_list."
            printf '%s\n' '{"os_list": []}' > "$out"
          fi

      - name: Show build output
        run: find website/public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
