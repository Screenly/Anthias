name: Build SBOMs

on:
  push:
    branches:
      - master
    paths:
      - 'bun.lock'
      - 'uv.lock'
      - '.github/workflows/sbom.yaml'

# Don't cancel master runs (each one publishes attestations).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolve the version once so both SBOMs ship with the same string.
  # Tag if HEAD is exactly on one (e.g. v0.20.5), else short SHA. The
  # checkout below fetches tags so `git describe --tags` can see them
  # without paying for full history.
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-tags: true

      - id: compute
        run: |
          v=$(git describe --tags --exact-match HEAD 2>/dev/null \
              || git rev-parse --short HEAD)
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "Resolved SBOM version: ${v}"

  js-sbom:
    needs: version
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and upload SBOM
        uses: sbomify/sbomify-action@ac8b0d423c90447f3011ef8ab5f9ff2e854c6931 # v26.2.0
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: 'LCkvzm8qaL'
          COMPONENT_VERSION: ${{ needs.version.outputs.version }}
          LOCK_FILE: 'bun.lock'
          AUGMENT: true
          ENRICH: true
          UPLOAD: true
          OUTPUT_FILE: js.cdx.json

      - name: Attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: '${{ github.workspace }}/*.cdx.json'

  python-sbom:
    needs: version
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and upload SBOM
        uses: sbomify/sbomify-action@ac8b0d423c90447f3011ef8ab5f9ff2e854c6931 # v26.2.0
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: 'Vhc4zm8pdV'
          COMPONENT_VERSION: ${{ needs.version.outputs.version }}
          LOCK_FILE: 'uv.lock'
          AUGMENT: true
          ENRICH: true
          UPLOAD: true
          OUTPUT_FILE: python.cdx.json

      - name: Attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: '${{ github.workspace }}/*.cdx.json'
