[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "anthias_django.settings"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
]
