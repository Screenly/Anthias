# vim: ft=yaml.docker-compose

services:
  anthias-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        GIT_HASH: ${GIT_HASH:-dev}
        GIT_SHORT_HASH: ${GIT_SHORT_HASH:-dev}
        GIT_BRANCH: ${GIT_BRANCH:-dev}
        DEVICE_TYPE: ${DEVICE_TYPE:-x86}
    ports:
      - 8000:8000
    environment:
      - HOME=/data
      - LISTEN=0.0.0.0
      - ENVIRONMENT=development
    restart: always
    volumes:
      - anthias-data:/data
      - ./:/usr/src/app/

  anthias-viewer:
    build:
      context: .
      dockerfile: docker/Dockerfile.viewer
      args:
        GIT_HASH: ${GIT_HASH:-dev}
        GIT_SHORT_HASH: ${GIT_SHORT_HASH:-dev}
        GIT_BRANCH: ${GIT_BRANCH:-dev}
        DEVICE_TYPE: ${DEVICE_TYPE:-x86}
    depends_on:
      - anthias-server
    environment:
      - HOME=/data
      - LISTEN=0.0.0.0
    restart: always
    volumes:
      - anthias-data:/data

volumes:
    anthias-data:
