{# vim: ft=htmldjango #}

<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <meta charset="utf-8"/>
    <title>Welcome to Anthias</title>
    <link href="{% static 'dist/css/anthias.css' %}" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css?family=Plus Jakarta Sans" rel="stylesheet">
    <link rel="icon" href="/static/favicons/favicon.ico">
    <style type="text/css">
        html, body {
            height: 100%;
            overflow-y: hidden;
        }
    </style>
</head>
<body class="splash container d-table">
<div class="col-12 d-table-cell align-middle">
    <div class="row">
        <div class="col-12">
            <div
                class="logo-container page-header d-flex flex-nowrap
                    justify-content-center align-items-center"
            >
                <img src="{{ splash_logo_url }}" alt="splash-logo" class="img-fluid"/>
            </div>
        </div>
    </div>
    <div class="splash-body p-5">
        <div class="row">
            <div class="col-12 text-center">
                <p id="splash-prompt-detecting">Detecting network&hellip;</p>
                <p id="splash-prompt-found" hidden>
                    To manage the content on this screen, just point your
                    browser to
                    <span id="splash-prompt-any" hidden>any of</span>
                    the IP <span id="splash-prompt-noun">address</span>
                    provided below.
                </p>
                <div class="form-actions" id="splash-ip-list"></div>
            </div>
        </div>
    </div>
</div>
<script>
(function() {
    var detecting = document.getElementById('splash-prompt-detecting');
    var found = document.getElementById('splash-prompt-found');
    var anyOf = document.getElementById('splash-prompt-any');
    var noun = document.getElementById('splash-prompt-noun');
    var list = document.getElementById('splash-ip-list');
    var attempts = 0;

    function render(ips) {
        if (!ips.length) {
            // Stay on the "Detecting network…" placeholder. The splash
            // only lives ~60s, so a permanent failure shows that the
            // whole time — same UX as the prior "Unable to retrieve IP."
            // fallback, but without crashing the page on 'Unknown'.
            detecting.hidden = false;
            found.hidden = true;
            list.innerHTML = '';
            return;
        }
        detecting.hidden = true;
        found.hidden = false;
        anyOf.hidden = ips.length <= 1;
        noun.textContent = ips.length > 1 ? 'addresses' : 'address';
        list.innerHTML = '';
        ips.forEach(function(ip, i) {
            var a = document.createElement('a');
            a.href = ip;
            a.textContent = ip;
            list.appendChild(a);
            if (i < ips.length - 1) {
                list.appendChild(document.createElement('br'));
            }
        });
    }

    function poll() {
        fetch('/api/v2/network/ip-addresses', { cache: 'no-store' })
            .then(function(r) { return r.ok ? r.json() : { ip_addresses: [] }; })
            .then(function(data) { render(data.ip_addresses || []); })
            .catch(function() { /* keep polling on transient errors */ })
            .finally(function() {
                attempts++;
                // 2s for the first ~30s, then back off to 5s. The host
                // bus is usually answering well before 30s; the slow
                // tier is for long-tail recoveries during the rest of
                // the splash's ~60s display window.
                setTimeout(poll, attempts < 15 ? 2000 : 5000);
            });
    }

    poll();
})();
</script>
</body>
</html>
