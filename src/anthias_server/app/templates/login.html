{% extends "base.html" %}

{% block title %}Login to Anthias{% endblock %}

{% block content %}
<div class="container mt-6 max-w-prose">
  <div class="surface">
    <h1 class="text-xl font-bold mb-4">Login to Anthias</h1>
    {% if messages %}
    <div class="rounded-lg border border-red-300 bg-red-50 text-red-800 px-4 py-3 mb-4 text-sm">
      {% for message in messages %}{{ message }}{% endfor %}
    </div>
    {% endif %}
    <form method="post" action="{% url 'anthias_app:login' %}" class="flex flex-col gap-3">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-floating">
        <input type="text" class="form-control" id="username" name="username" placeholder=" " required>
        <label for="username">Username</label>
      </div>
      <div class="form-floating">
        <input type="password" class="form-control" id="password" name="password" placeholder=" " required>
        <label for="password">Password</label>
      </div>
      <button type="submit" class="btn btn-primary mt-2">
        <i class="ti ti-login"></i><span>Login</span>
      </button>
    </form>
  </div>
</div>
{% endblock %}
