{% comment %}Global toast stack. Driven by the Alpine.store('toasts') registered in vendor.ts. Server emits via HX-Trigger header (HTMX requests) or Django flash messages drained from the embedded JSON below (full-page redirects).{% endcomment %}
<div class="toast-stack" aria-live="polite" aria-atomic="true" x-data>
  <template x-for="t in $store.toasts.items" :key="t.id">
    <div class="toast" :class="`toast--${t.kind}`" x-transition.opacity.duration.180ms role="status">
      <i class="bi" :class="t.kind === 'error' ? 'bi-exclamation-triangle-fill' : t.kind === 'success' ? 'bi-check-circle-fill' : 'bi-info-circle-fill'"></i>
      <span class="toast__msg" x-text="t.message"></span>
      <button type="button" class="toast__close" @click="$store.toasts.dismiss(t.id)" aria-label="Dismiss">
        <i class="bi bi-x"></i>
      </button>
    </div>
  </template>
</div>

{% if messages %}
<script id="django-messages" type="application/json">[
  {% for message in messages %}{"tags": "{{ message.tags|escapejs }}", "message": "{{ message|escapejs }}"}{% if not forloop.last %},{% endif %}{% endfor %}
]</script>
{% endif %}
