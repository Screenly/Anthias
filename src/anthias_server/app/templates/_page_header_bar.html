{% comment %}Reusable page-header bar: title + optional lede + actions slot. Vars: title (required), lede (optional), actions (optional HTML-safe right-hand action group).{% endcomment %}
<div class="page-header-bar">
  <div class="page-header-bar__title">
    <h1 class="page-header">{{ title }}</h1>
    {% if lede %}<p class="page-header-bar__lede">{{ lede }}</p>{% endif %}
  </div>
  {% if actions %}
  <div class="page-header-bar__actions">{{ actions|safe }}</div>
  {% endif %}
</div>
