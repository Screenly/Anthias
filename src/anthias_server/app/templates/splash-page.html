{# vim: ft=htmldjango #}

<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="utf-8"/>
    <title>Welcome to Anthias</title>
    <link href="{% static 'dist/css/tailwind.css' %}" rel="stylesheet"/>
    <link href="{% static 'dist/css/anthias.css' %}" rel="stylesheet"/>
    <link rel="icon" href="/static/favicons/favicon.ico"/>
    <script src="{% static 'dist/js/splash.js' %}" defer></script>
</head>
<body class="splash-page">
<main class="splash-shell">
  <div class="splash-card">
    <div class="splash-card__brand">
      <img src="{{ splash_logo_url }}" alt="Anthias" class="splash-logo"/>
    </div>

    <div class="splash-card__body">
      <p id="splash-status-detecting" class="splash-status">
        <span class="splash-status__dot splash-status__dot--pulse" aria-hidden="true"></span>
        <span>Detecting network&hellip;</span>
      </p>
      <p id="splash-status-ready" class="splash-status" hidden>
        <span class="splash-status__dot splash-status__dot--ok" aria-hidden="true"></span>
        <span>Ready to manage</span>
      </p>

      <h1 class="splash-headline">Open this on your phone or laptop</h1>
      <p class="splash-subhead">Point a browser at one of the addresses below, or scan the QR code.</p>

      <div id="splash-ip-list" class="splash-ip-list" aria-live="polite"></div>
    </div>

    <aside id="splash-qr-card" class="splash-card__qr" hidden>
      <div id="splash-qr" class="splash-qr"></div>
      <p class="splash-qr__caption">Scan to manage</p>
    </aside>
  </div>
</main>
<script>
  // The splash bundle reverses the API URL via Django so the JS layer
  // doesn't hard-code the version prefix.
  window.__splashIpsUrl = '{% url "api:network_ip_addresses_v2" %}';
</script>
</body>
</html>
