<div class="modal fade" id="editAssetModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Asset</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editAssetForm">
        <input type="hidden" id="edit-asset-id">
        <div class="modal-body">
          <div class="mb-3">
            <label for="edit-name" class="form-label text-start w-100">Name</label>
            <input type="text" class="form-control" id="edit-name" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-start w-100">Location</label>
            <div id="edit-uri-display" class="form-control-plaintext text-truncate small text-muted"></div>
          </div>
          <div class="mb-3">
            <label for="edit-mimetype" class="form-label text-start w-100">Asset Type</label>
            <select class="form-select" id="edit-mimetype">
              <option value="image">Image</option>
              <option value="video">Video</option>
              <option value="webpage">Web Page</option>
              <option value="streaming">Streaming</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="edit-duration" class="form-label text-start w-100">Duration (seconds)</label>
            <input type="number" class="form-control" id="edit-duration" min="0">
          </div>
          <div class="row mb-3">
            <div class="col-6">
              <label for="edit-start-date" class="form-label text-start w-100">Start Date</label>
              <input type="date" class="form-control" id="edit-start-date">
            </div>
            <div class="col-6">
              <label for="edit-start-time" class="form-label text-start w-100">Start Time</label>
              <input type="time" class="form-control" id="edit-start-time">
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-6">
              <label for="edit-end-date" class="form-label text-start w-100">End Date</label>
              <input type="date" class="form-control" id="edit-end-date">
            </div>
            <div class="col-6">
              <label for="edit-end-time" class="form-label text-start w-100">End Time</label>
              <input type="time" class="form-control" id="edit-end-time">
            </div>
          </div>
          <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="edit-is-enabled">
            <label class="form-check-label text-start" for="edit-is-enabled">Enabled</label>
          </div>
          <hr>
          <p class="text-muted small mb-2">Advanced</p>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="edit-nocache">
            <label class="form-check-label text-start" for="edit-nocache">Disable cache</label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="edit-skip-asset-check">
            <label class="form-check-label text-start" for="edit-skip-asset-check">Skip asset check</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger me-auto"
                  onclick="deleteAsset(document.getElementById('edit-asset-id').value); bootstrap.Modal.getInstance(document.getElementById('editAssetModal')).hide();">
            <i class="fa-solid fa-trash me-1"></i> Delete
          </button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
