---
- name: Ensure folders exist
  ansible.builtin.file:
    path: "/home/{{ anthias_user }}/{{ item }}"
    state: directory
    owner: "{{ anthias_user }}"
    group: "{{ anthias_user }}"
    mode: "0755"
  with_items:
    - .screenly
    - .config
    - screenly_assets

- name: Create empty .asoundrc
  ansible.builtin.file:
    path: "/home/{{ anthias_user }}/.asoundrc"
    state: touch
    force: false
    group: "{{ anthias_user }}"
    owner: "{{ anthias_user }}"
    mode: "0644"

- name: Copy Screenly default assets file
  ansible.builtin.copy:
    owner: "{{ anthias_user }}"
    group: "{{ anthias_user }}"
    mode: "0644"
    src: default_assets.yml
    dest: "/home/{{ anthias_user }}/.screenly/default_assets.yml"
    force: true

- name: Remove deprecated parameter "listen"
  ansible.builtin.lineinfile:
    regexp: '^.*listen.*'
    state: absent
    dest: "/home/{{ anthias_user }}/.screenly/screenly.conf"

- name: Install pip dependencies
  ansible.builtin.pip:
    executable: "/home/{{ anthias_user }}/installer_venv/bin/pip"
    requirements: "/home/{{ anthias_user }}/screenly/requirements/requirements.host.txt"
    extra_args: "--no-cache-dir --upgrade"
  when: ansible_distribution_major_version | int >= 12

# Debian 11 ships Python 3.9. ansible-core 2.16+ requires Python 3.10+
# on the controller, so we pin to the last 2.15.x release for that
# branch only. Other deps track the host group where Py3.9 supports it.
- name: Install pip dependencies (Debian 11)
  ansible.builtin.pip:
    executable: "/home/{{ anthias_user }}/installer_venv/bin/pip"
    name:
      - ansible-core==2.15.13
      - getmac==0.9.5
      - netifaces2==0.0.22
      - redis==7.4.0
      - "requests[security]==2.33.1"
      - tenacity==9.1.2
    extra_args: "--no-cache-dir --upgrade"
  when: ansible_distribution_major_version | int <= 11

- name: Remove screenly_utils.sh
  ansible.builtin.file:
    state: absent
    path: /usr/local/bin/screenly_utils.sh

- name: Cron job to cleanup screenly_assets
  ansible.builtin.cron:
    name: Cleanup screenly_assets
    state: absent
    user: "{{ anthias_user }}"

- name: Download upgrade script from github repository
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/Screenly/Anthias/master/bin/install.sh
    dest: /usr/local/sbin/upgrade_anthias.sh
    mode: "0700"
    owner: root
    group: root
    force: true

- name: Remove the old upgrade script
  ansible.builtin.file:
    state: absent
    path: /usr/local/sbin/upgrade_screenly.sh
    owner: root
    group: root

- name: Install sudoers rule for Anthias user
  ansible.builtin.template:
    src: screenly_overrides.j2
    dest: /etc/sudoers.d/screenly_overrides
    mode: "0440"
    owner: root
    group: root
    validate: /usr/sbin/visudo -cf %s

- name: Remove /usr/local/bin/screenly_usb_assets.sh (deprecated)
  ansible.builtin.file:
    state: absent
    path: /usr/local/bin/screenly_usb_assets.sh
    owner: root
    group: root

- name: Cleans up autoplay udev rule
  ansible.builtin.file:
    state: absent
    path: /etc/udev/rules.d/50-autoplay.rules

- name: Copy screenly systemd units
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  with_items: "{{ screenly_systemd_units }}"

- name: Remove plymouth-quit-wait.service
  ansible.builtin.file:
    state: absent
    dest: /lib/systemd/system/plymouth-quit-wait.service

- name: Remove plymouth-quit.service
  ansible.builtin.file:
    state: absent
    dest: /lib/systemd/system/plymouth-quit.service

- name: Enable screenly systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  with_items: "{{ screenly_systemd_units }}"

- name: Check if deprecated systemd services exists
  ansible.builtin.stat:
    path: /etc/systemd/system/X.service
  register: screenly_x_service

- name: Set screenly_x_service_exists fact
  ansible.builtin.set_fact:
    screenly_x_service_exists: "{{ screenly_x_service.stat.exists }}"

- name: Disable deprecated systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  with_items: "{{ screenly_deprecated_systemd_units }}"
  when: screenly_x_service_exists

- name: Remove deprecated systemd units
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  with_items: "{{ screenly_deprecated_systemd_units }}"

- name: Remove the ngrok binary
  ansible.builtin.file:
    path: "/usr/local/bin/ngrok"
    state: absent
    owner: root
    group: root
