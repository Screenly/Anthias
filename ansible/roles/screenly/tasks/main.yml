---
- name: Ensure folders exist
  ansible.builtin.file:
    path: "/home/{{ anthias_user }}/{{ item }}"
    state: directory
    owner: "{{ anthias_user }}"
    group: "{{ anthias_user }}"
    mode: "0755"
  with_items:
    - .screenly
    - .config
    - screenly_assets

- name: Create empty .asoundrc
  ansible.builtin.file:
    path: "/home/{{ anthias_user }}/.asoundrc"
    state: touch
    force: false
    group: "{{ anthias_user }}"
    owner: "{{ anthias_user }}"
    mode: "0644"

- name: Copy Screenly default assets file
  ansible.builtin.copy:
    owner: "{{ anthias_user }}"
    group: "{{ anthias_user }}"
    mode: "0644"
    src: default_assets.yml
    dest: "/home/{{ anthias_user }}/.screenly/default_assets.yml"
    force: true

- name: Remove deprecated parameter "listen"
  ansible.builtin.lineinfile:
    regexp: '^.*listen.*'
    state: absent
    dest: "/home/{{ anthias_user }}/.screenly/screenly.conf"

- name: Sync host pip dependencies via uv
  ansible.builtin.command:
    cmd: >-
      /home/{{ anthias_user }}/.local/bin/uv sync
        --no-default-groups
        --group host
        --no-install-project
    chdir: "/home/{{ anthias_user }}/screenly"
  environment:
    UV_PROJECT_ENVIRONMENT: "/home/{{ anthias_user }}/installer_venv"
  become: false
  register: screenly_uv_sync
  changed_when: "'Installed' in screenly_uv_sync.stderr or 'Updated' in screenly_uv_sync.stderr"

# install.sh is the single source of truth for both fresh installs and
# upgrades. We re-download it from the same ref each run so users can
# pull in fixes without re-installing. No checksum is pinned because
# the URL itself moves; integrity is bounded by HTTPS to githubusercontent
# and by the pre-install user prompt that runs the script. If we ever
# adopt signed releases, switch to fetching the signed asset by tag.
- name: Install upgrade_anthias.sh from the current branch
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/Screenly/Anthias/master/bin/install.sh"
    dest: /usr/local/sbin/upgrade_anthias.sh
    mode: "0700"
    owner: root
    group: root
    force: true

- name: Install sudoers rule for Anthias user
  ansible.builtin.template:
    src: screenly_overrides.j2
    dest: /etc/sudoers.d/screenly_overrides
    mode: "0440"
    owner: root
    group: root
    validate: /usr/sbin/visudo -cf %s

- name: Install Anthias systemd units
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  with_items: "{{ screenly_systemd_units }}"

- name: Enable Anthias systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  with_items: "{{ screenly_systemd_units }}"
