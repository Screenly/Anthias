---
- name: Install network systemd units
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  with_items: "{{ network_systemd_units }}"

- name: Enable network systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  with_items: "{{ network_systemd_units }}"

- name: Debug msg for manage network
  ansible.builtin.debug:
    msg: "Manage network: {{ manage_network }}"

- name: Add current user to Identity
  ansible.builtin.replace:
    regexp: '^Identity=.*'
    replace: "Identity=unix-group:netdev;unix-group:sudo:{{ anthias_user }}"
    dest: /var/lib/polkit-1/localauthority/10-vendor.d/org.freedesktop.NetworkManager.pkla
  when:
    - manage_network|bool
    - ansible_distribution_major_version|int <= 12

- name: Set ResultAny to yes
  ansible.builtin.replace:
    regexp: '^ResultAny=.*'
    replace: 'ResultAny=yes'
    dest: /var/lib/polkit-1/localauthority/10-vendor.d/org.freedesktop.NetworkManager.pkla
  when:
    - manage_network|bool
    - ansible_distribution_major_version|int <= 12

- name: Get stat of org.freedesktop.NetworkManager.pkla
  ansible.builtin.stat:
    path: /etc/polkit-1/localauthority/50-local.d/org.freedesktop.NetworkManager.pkla
  register: network_pkla_stat

- name: Copy org.freedesktop.NetworkManager.pkla to 50-local.d
  ansible.builtin.shell: |
    mkdir -p /etc/polkit-1/localauthority/50-local.d
    cp -f /var/lib/polkit-1/localauthority/10-vendor.d/org.freedesktop.NetworkManager.pkla \
      /etc/polkit-1/localauthority/50-local.d
  when:
    - manage_network|bool
    - ansible_distribution_major_version|int <= 12
  changed_when: not network_pkla_stat.stat.exists

- name: Create polkit rules for NetworkManager (Trixie+)
  ansible.builtin.copy:
    dest: /etc/polkit-1/rules.d/50-network-manager.rules
    owner: root
    group: root
    mode: "0644"
    content: |
      polkit.addRule(function(action, subject) {
          if (action.id.indexOf("org.freedesktop.NetworkManager.") === 0 &&
              (subject.isInGroup("netdev") || subject.isInGroup("sudo") ||
               subject.user === "{{ anthias_user }}")) {
              return polkit.Result.YES;
          }
      });
  when:
    - manage_network|bool
    - ansible_distribution_major_version|int >= 13

- name: Gather service facts
  ansible.builtin.service_facts:
  when:
    - ansible_distribution_major_version|int >= 9
    - ansible_distribution_major_version|int <= 11
    - manage_network|bool

- name: Disable dhcpcd
  ansible.builtin.systemd:
    state: stopped
    name: dhcpcd
    enabled: false
  when:
    - ansible_distribution_major_version|int >= 9
    - ansible_distribution_major_version|int <= 11
    - manage_network|bool
    - "'dhcpcd.service' in ansible_facts.services"

- name: Activate NetworkManager
  ansible.builtin.systemd:
    state: started
    name: NetworkManager
    enabled: true
  when:
    - ansible_distribution_major_version|int >= 9
    - manage_network|bool
