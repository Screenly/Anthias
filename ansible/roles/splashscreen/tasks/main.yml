---
- name: Remove deprecated splash assets
  ansible.builtin.file:
    state: absent
    path: "{{ item }}"
  with_items:
    - /etc/splashscreen.jpg
    - /etc/splashscreen.png
    - /etc/init.d/asplashscreen

- name: Check if asplashscreen rc script is registered
  ansible.builtin.stat:
    path: /etc/rcS.d/S01asplashscreen
  register: splashscreen_asplashscreen_stat

- name: Disable asplashscreen
  ansible.builtin.command: update-rc.d asplashscreen remove
  when: splashscreen_asplashscreen_stat.stat.exists
  changed_when: splashscreen_asplashscreen_stat.stat.exists

- name: Install Plymouth packages
  ansible.builtin.apt:
    name:
      - plymouth
      - plymouth-themes
      - plymouth-label

- name: Remove the old Plymouth scripts
  ansible.builtin.file:
    state: absent
    path: /usr/share/plymouth/themes/screenly/
    owner: root
    group: root

- name: Install plymouth theme files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /usr/share/plymouth/themes/anthias/
    mode: "0644"
    owner: root
    group: root
  with_items:
    - anthias.plymouth
    - anthias.script
    - splashscreen.png

- name: Get current plymouth theme
  ansible.builtin.command: plymouth-set-default-theme
  register: splashscreen_plymouth_theme
  changed_when: false

- name: Set plymouth default theme to anthias
  ansible.builtin.command: plymouth-set-default-theme -R anthias
  changed_when: splashscreen_plymouth_theme.stdout != "anthias"

- name: Install plymouthd defaults
  ansible.builtin.copy:
    src: plymouthd.default
    dest: /usr/share/plymouth/plymouthd.defaults
    mode: "0644"
    owner: root
    group: root

- name: Install plymouthd.conf
  ansible.builtin.copy:
    src: plymouthd.default
    dest: /etc/plymouth/plymouthd.conf
    mode: "0644"
    owner: root
    group: root
