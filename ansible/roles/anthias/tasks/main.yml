---
- name: Ensure folders exist
  ansible.builtin.file:
    path: "/home/{{ anthias_user }}/{{ item }}"
    state: directory
    owner: "{{ anthias_user }}"
    group: "{{ anthias_user }}"
    mode: "0755"
  with_items:
    - .anthias
    - .config
    - anthias_assets

- name: Create empty .asoundrc
  ansible.builtin.file:
    path: "/home/{{ anthias_user }}/.asoundrc"
    state: touch
    force: false
    group: "{{ anthias_user }}"
    owner: "{{ anthias_user }}"
    mode: "0644"

- name: Copy Anthias default assets file
  ansible.builtin.copy:
    owner: "{{ anthias_user }}"
    group: "{{ anthias_user }}"
    mode: "0644"
    src: default_assets.yml
    dest: "/home/{{ anthias_user }}/.anthias/default_assets.yml"
    force: true

- name: Remove deprecated parameter "listen"
  ansible.builtin.lineinfile:
    regexp: '^.*listen.*'
    state: absent
    dest: "/home/{{ anthias_user }}/.anthias/anthias.conf"

# install.sh is the single source of truth for both fresh installs and
# upgrades. We re-download it from the same ref the user is installing
# (anthias_branch) so a tag-pinned install gets the matching upgrade
# script, not master's. No checksum is pinned because the URL is
# expected to move with the ref; integrity is bounded by HTTPS to
# githubusercontent. If we ever ship signed release assets, switch
# to fetching the signed asset by tag.
- name: Install upgrade_anthias.sh from the configured branch
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/Screenly/Anthias/{{ anthias_branch }}/bin/install.sh"
    dest: /usr/local/sbin/upgrade_anthias.sh
    mode: "0700"
    owner: root
    group: root
    force: true

- name: Remove legacy sudoers file
  ansible.builtin.file:
    path: /etc/sudoers.d/screenly_overrides
    state: absent

- name: Install sudoers rule for Anthias user
  ansible.builtin.template:
    src: anthias_overrides.j2
    dest: /etc/sudoers.d/anthias_overrides
    mode: "0440"
    owner: root
    group: root
    validate: /usr/sbin/visudo -cf %s

- name: Create persistent runtime venv for host-managed services
  # `bin/install.sh::install_ansible` uses a `mktemp`-allocated venv
  # for the installer itself, torn down by the EXIT trap so $HOME
  # doesn't accumulate stale Python state. That ephemeral path can't
  # back a long-lived systemd unit, so the host_agent service
  # (referenced below) needs its own stable venv. Re-syncing the
  # `host` group keeps the dependency set in lockstep with the
  # installer's — uv resolves both from the same pyproject.toml.
  ansible.builtin.command:
    cmd: >-
      {{ anthias_user_home }}/.local/bin/uv sync
      --project {{ anthias_user_home }}/anthias
      --no-default-groups
      --group host
      --no-install-project
    creates: "{{ anthias_user_home }}/.anthias-venv/bin/python"
  environment:
    UV_PROJECT_ENVIRONMENT: "{{ anthias_user_home }}/.anthias-venv"
  become_user: "{{ anthias_user }}"
  vars:
    anthias_user_home: "/home/{{ anthias_user }}"

- name: Install Anthias systemd units
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  with_items: "{{ anthias_systemd_units }}"

- name: Enable Anthias systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  with_items: "{{ anthias_systemd_units }}"
