# Anthias firmware config — included from config.txt.
#
# Pi firmware processes `include` inline, inheriting the enclosing
# section filter. The leading [all] guarantees our directives apply on
# every model regardless of which section the `include` line lands in.
[all]

# Silent boot: suppress the firmware rainbow splash screen.
disable_splash=1

# Framebuffer depth and alpha — video playback expects 32-bit framebuffer
# without the alpha channel honoured.
framebuffer_depth=32
framebuffer_ignore_alpha=1

# GPU memory split, by board RAM size. Larger GPU partitions improve
# hardware video decode headroom on the smaller models.
gpu_mem_256=96
gpu_mem_512=128
gpu_mem_1024=196
