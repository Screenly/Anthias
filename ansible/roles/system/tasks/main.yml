---
- name: Resolve boot config and cmdline paths
  ansible.builtin.set_fact:
    system_config_path: "{{ '/boot/config.txt' if ansible_distribution_major_version | int <= 11 else '/boot/firmware/config.txt' }}"
    system_cmdline_path: "{{ '/boot/cmdline.txt' if ansible_distribution_major_version | int <= 11 else '/boot/firmware/cmdline.txt' }}"

- name: Check NOOBS
  ansible.builtin.command: cat {{ system_config_path }}
  register: system_config_txt
  changed_when: false
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Make sure we have proper framebuffer depth
  ansible.builtin.lineinfile:
    dest: "{{ system_config_path }}"
    regexp: ^framebuffer_depth=
    line: framebuffer_depth=32
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Fix framebuffer bug
  ansible.builtin.lineinfile:
    dest: "{{ system_config_path }}"
    regexp: ^framebuffer_ignore_alpha=
    line: framebuffer_ignore_alpha=1
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Add gpu_mem_256 in config.txt if it doesn't exist
  ansible.builtin.lineinfile:
    path: "{{ system_config_path }}"
    line: gpu_mem_256=96
  when: system_config_txt.stdout.find('gpu_mem_256') == -1
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Add gpu_mem_512 in config.txt if it doesn't exist
  ansible.builtin.lineinfile:
    path: "{{ system_config_path }}"
    line: gpu_mem_512=128
  when: system_config_txt.stdout.find('gpu_mem_512') == -1
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Add gpu_mem_1024 in config.txt if it doesn't exist
  ansible.builtin.lineinfile:
    path: "{{ system_config_path }}"
    line: gpu_mem_1024=196
  when: system_config_txt.stdout.find('gpu_mem_1024') == -1
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Add pi4 section in config.txt if it doesn't exist
  ansible.builtin.lineinfile:
    path: "{{ system_config_path }}"
    line: "\n[pi4]"
  when: system_config_txt.stdout.find('[pi4]') == -1
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Uncomment out the original dtoverlay config.
  ansible.builtin.replace:
    dest: "{{ system_config_path }}"
    regexp: '^#\s*(dtoverlay=vc4-kms-v3d)'
    replace: '\1'
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Remove the FKMS config for all devices.
  ansible.builtin.lineinfile:
    path: "{{ system_config_path }}"
    state: absent
    regexp: "^dtoverlay=vc4-fkms-v3d$"
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Backup kernel boot args
  ansible.builtin.copy:
    src: "{{ system_cmdline_path }}"
    dest: "{{ system_cmdline_path }}.orig"
    owner: root
    group: root
    mode: "0755"
    force: false
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Notice for cmdline.txt.orig file
  ansible.builtin.debug:
    msg: "Use cmdline.txt.orig for boot parameters (don't remove this file)"
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Copy cmdline.txt.orig to cmdline.txt
  ansible.builtin.copy:
    src: "{{ system_cmdline_path }}.orig"
    dest: "{{ system_cmdline_path }}"
    owner: root
    group: root
    mode: "0755"
    force: true
  when: system_config_txt.stdout.find('NOOBS') == -1
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: For splash screen using Plymouth
  ansible.builtin.replace:
    dest: "{{ system_cmdline_path }}"
    regexp: (^(?!$)((?!splash).)*$)
    replace: \1 splash
  when: ansible_distribution_major_version | int >= 7
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Remove blinking cursor
  ansible.builtin.replace:
    dest: "{{ system_cmdline_path }}"
    regexp: (^(?!$)((?!vt.global_cursor_default=0).)*$)
    replace: \1 vt.global_cursor_default=0
  when: ansible_distribution_major_version | int >= 7
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Plymouth ignore serial consoles
  ansible.builtin.replace:
    dest: "{{ system_cmdline_path }}"
    regexp: (^(?!$)((?!plymouth.ignore-serial-consoles).)*$)
    replace: \1 plymouth.ignore-serial-consoles
  when: ansible_distribution_major_version | int >= 7
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Use Systemd as init and quiet boot process
  ansible.builtin.replace:
    dest: "{{ system_cmdline_path }}"
    regexp: (^(?!$)((?!quiet init=/lib/systemd/systemd).)*$)
    replace: \1 quiet init=/lib/systemd/systemd
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Set ethN/wlanN names for interfaces
  ansible.builtin.replace:
    dest: "{{ system_cmdline_path }}"
    regexp: (^(?!$)((?!net\.ifnames=0).)*$)
    replace: \1 net.ifnames=0
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Set cgroup_enable required by containerd for OOM
  ansible.builtin.replace:
    dest: "{{ system_cmdline_path }}"
    regexp: (^(?!$)((?!cgroup_enable=memory).)*$)
    replace: \1 cgroup_enable=memory
  when: ansible_distribution_major_version | int >= 7
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Set cgroup_memory required by containerd for OOM
  ansible.builtin.replace:
    dest: "{{ system_cmdline_path }}"
    regexp: (^(?!$)((?!cgroup_memory=1).)*$)
    replace: \1 cgroup_memory=1
  when: ansible_distribution_major_version | int >= 7
  tags:
    - touches-boot-partition
    - raspberry-pi

# Sometimes in some packages there are no necessary files.
# They are required to install pip dependencies.
# In this case we need to reinstall the packages.
- name: Check if cdefs.h exists
  ansible.builtin.stat:
    path: /usr/include/arm-linux-gnueabihf/sys/cdefs.h
  register: system_cdefs

- name: Set fact for cdefs
  ansible.builtin.set_fact:
    system_cdefs_exists: "{{ system_cdefs.stat.exists }}"

- name: Remove libc6-dev
  ansible.builtin.apt:
    name: libc6-dev
    state: absent
  when: not system_cdefs_exists

- name: Install libc6-dev
  ansible.builtin.apt:
    name: libc6-dev
    state: present
    update_cache: true
  when: not system_cdefs_exists

- name: Install Anthias dependencies (all platforms)
  ansible.builtin.apt:
    name:
      - bc
      - python3
      - python3-redis
    state: present

- name: Remove deprecated apt dependencies
  ansible.builtin.apt:
    name:
      - dphys-swapfile
      - lightdm
      - lightdm-gtk-greeter
      - matchbox
      - nginx-common
      - nginx-light
      - pix-plym-splash
      - rabbitmq-server
      - redis-server
      - supervisor
      - uzbl
      - x11-xserver-utils
      - xserver-xorg
    state: absent

- name: Make sure distro package of Docker is absent
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
      - docker-compose
    state: absent

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Docker apt key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Set system_architecture
  ansible.builtin.set_fact:
    system_architecture: >-
      {{
        'amd64' if ansible_architecture == 'x86_64'
        else ('arm64' if device_type in ['pi4', 'pi5']
                          and ansible_userspace_bits == '64'
        else 'armhf')
      }}

- name: Add Docker repo
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/docker.list
    create: true
    line: >-
      deb [arch={{ system_architecture }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    state: present
    owner: root
    group: root
    mode: "0644"

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce:{{ system_architecture }}
      - docker-ce-cli:{{ system_architecture }}
      - docker-compose-plugin:{{ system_architecture }}
    update_cache: true
    install_recommends: false

- name: Check if /etc/timezone exists
  ansible.builtin.stat:
    path: /etc/timezone
  register: system_etc_timezone

- name: Resolve /etc/localtime symlink
  ansible.builtin.command: readlink -f /etc/localtime
  register: system_localtime_link
  changed_when: false
  when: not system_etc_timezone.stat.exists

- name: Create /etc/timezone from /etc/localtime
  ansible.builtin.copy:
    content: "{{ system_localtime_link.stdout | regex_replace('.*/zoneinfo/', '') }}\n"
    dest: /etc/timezone
    owner: root
    group: root
    mode: "0644"
  when: not system_etc_timezone.stat.exists

- name: Ensure Anthias user is in required groups
  ansible.builtin.user:
    name: "{{ anthias_user }}"
    group: "{{ anthias_user }}"
    append: true
    groups: "{{ anthias_base_groups + (anthias_pi_groups if is_raspberry_pi else []) }}"
  vars:
    anthias_base_groups:
      - docker
      - adm
      - sudo
      - video
      - plugdev
      - users
      - input
      - netdev
      - dialout
    anthias_pi_groups:
      - gpio
    is_raspberry_pi: "{{ ansible_architecture in ['aarch64', 'armv7l', 'armv6l'] }}"

- name: Perform system upgrade
  ansible.builtin.apt:
    upgrade: dist
  tags:
    - system-upgrade

- name: Clean up unused packages
  ansible.builtin.apt:
    autoremove: true
  tags:
    - system-upgrade

- name: Copy in rc.local
  ansible.builtin.template:
    src: rc.local
    dest: /etc/rc.local
    mode: "0755"
    owner: root
    group: root

- name: Copy in 01_nodoc
  ansible.builtin.copy:
    src: 01_nodoc
    dest: /etc/dpkg/dpkg.cfg.d/01_nodoc
    mode: "0644"
    owner: root
    group: root

- name: Disable swap
  ansible.builtin.command:
    cmd: /sbin/swapoff --all
    removes: /var/swap

- name: Remove swapfile from disk
  ansible.builtin.file:
    path: /var/swap
    state: absent
