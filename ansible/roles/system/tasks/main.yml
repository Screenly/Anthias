---
- name: Configure boot partition (/boot/{config,cmdline}.txt)
  ansible.builtin.include_tasks:
    file: boot.yml
    # Without apply:, Ansible's --tags filter would let the include
    # itself match (so the tasks get *included*) but then filter every
    # task inside boot.yml back out — touches-boot-partition would
    # become a no-op. apply: copies these tags onto each included
    # task so they actually run when the include matches.
    apply:
      tags:
        - touches-boot-partition
        - raspberry-pi
  tags:
    - touches-boot-partition
    - raspberry-pi

- name: Configure GRUB cmdline for Plymouth (x86)
  ansible.builtin.include_tasks: grub.yml
  when: device_type == 'x86'

- name: Install/remove apt packages
  ansible.builtin.include_tasks: packages.yml

- name: Install and configure Docker
  ansible.builtin.include_tasks: docker.yml

- name: Configure /etc/timezone
  ansible.builtin.include_tasks: timezone.yml

- name: Apply distribution upgrade
  ansible.builtin.include_tasks: dist_upgrade.yml
  tags:
    - system-upgrade

- name: Miscellaneous host-level config (rc.local, dpkg, swap)
  ansible.builtin.include_tasks: misc.yml
