---
- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    # /etc/apt/keyrings is the convention from the Debian docs and must
    # be world-traversable so the unprivileged `_apt` user can read keys.
    mode: "0755"  # NOSONAR

- name: Add Docker apt key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    # World-readable required so the `_apt` user can verify packages.
    mode: "0644"  # NOSONAR

- name: Set system_architecture
  ansible.builtin.set_fact:
    # Map every validated device_type (see site.yml) to a dpkg
    # architecture. Exhaustive by design: an unmapped device_type
    # raises rather than falling through to a default. The previous
    # form used `device_type in ['pi4', 'pi5']`, which silently
    # missed `pi4-64` after #2779 renamed the value, and every Pi 4
    # ran an upgrade resolving to armhf as a result.
    system_architecture: "{{ docker_arch_by_device_type[device_type] }}"
  vars:
    docker_arch_by_device_type:
      x86: amd64
      pi5: arm64
      pi4-64: arm64
      pi3: armhf
      pi2: armhf

- name: Add Docker repo
  # copy, not lineinfile, so a stale `[arch=...]` entry from an earlier
  # run is rewritten rather than left sitting alongside the correct one.
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: >
      deb [arch={{ system_architecture }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable
    owner: root
    group: root
    # World-readable required so the `_apt` user can read the source list.
    mode: "0644"  # NOSONAR

- name: Install Docker
  # On hosts already running the wrong arch, apt swaps automatically:
  # docker-ce is Multi-Arch: foreign so requesting `:arm64` removes
  # the `:armhf` install (and pulls dependencies in the new arch).
  ansible.builtin.apt:
    name:
      - docker-ce:{{ system_architecture }}
      - docker-ce-cli:{{ system_architecture }}
      - docker-compose-plugin:{{ system_architecture }}
    update_cache: true
    install_recommends: false

# Several of these groups (netdev, input, plugdev, gpio) are normally
# created by udev / network-manager / raspi-config. On a minimal
# Debian/x86 image they may be missing, so create them up-front. This
# is a no-op when they already exist.
- name: Ensure required groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
    system: true
  loop: "{{ anthias_required_groups }}"
  vars:
    anthias_required_groups: >-
      {{ anthias_base_groups +
         (anthias_pi_groups if is_raspberry_pi else []) }}
    anthias_base_groups: &base_groups
      - docker
      - adm
      - sudo
      - video
      - plugdev
      - users
      - input
      - netdev
      - dialout
    anthias_pi_groups: &pi_groups
      - gpio
    is_raspberry_pi: &is_pi >-
      {{ ansible_architecture in ['aarch64', 'armv7l', 'armv6l'] }}

- name: Ensure Anthias user is in required groups
  ansible.builtin.user:
    name: "{{ anthias_user }}"
    group: "{{ anthias_user }}"
    append: true
    groups: "{{ anthias_base_groups + (anthias_pi_groups if is_raspberry_pi else []) }}"
  vars:
    anthias_base_groups: *base_groups
    anthias_pi_groups: *pi_groups
    is_raspberry_pi: *is_pi
