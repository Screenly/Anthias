---
# Some Pi armhf base images ship libc6-dev with the cdefs.h header
# missing, which breaks compilation of any wheel that pulls in
# <sys/cdefs.h>. Reinstalling libc6-dev pulls in the missing files.
# This workaround is armhf-only — on aarch64/x86 the header lives at
# a different path and the original bug doesn't apply, so we'd just
# be doing pointless reinstalls every run.
- name: Reinstall libc6-dev if cdefs.h is missing (armhf only)
  when: ansible_architecture == 'armv7l'
  block:
    - name: Check if cdefs.h exists
      ansible.builtin.stat:
        path: /usr/include/arm-linux-gnueabihf/sys/cdefs.h
      register: system_cdefs

    - name: Remove libc6-dev
      ansible.builtin.apt:
        name: libc6-dev
        state: absent
      when: not system_cdefs.stat.exists

    - name: Install libc6-dev
      ansible.builtin.apt:
        name: libc6-dev
        state: present
        update_cache: true
      when: not system_cdefs.stat.exists

- name: Install Anthias dependencies
  ansible.builtin.apt:
    name:
      - bc
      - python3
      - python3-redis
    state: present

# Defensive: base images may ship one of these old packages from the
# pre-Anthias / Screenly OSE era. Removing them avoids conflicts with
# the containerised stack.
- name: Remove deprecated apt dependencies
  ansible.builtin.apt:
    name:
      - dphys-swapfile
      - lightdm
      - lightdm-gtk-greeter
      - matchbox
      - nginx-common
      - nginx-light
      - pix-plym-splash
      - rabbitmq-server
      - redis-server
      - supervisor
      - uzbl
      - x11-xserver-utils
      - xserver-xorg
    state: absent

- name: Remove distro Docker packages
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
      - docker-compose
    state: absent
