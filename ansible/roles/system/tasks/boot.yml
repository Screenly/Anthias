---
- name: Resolve boot config and cmdline paths
  ansible.builtin.set_fact:
    system_config_path: "{{ '/boot/config.txt' if ansible_distribution_major_version | int <= 11 else '/boot/firmware/config.txt' }}"
    system_cmdline_path: "{{ '/boot/cmdline.txt' if ansible_distribution_major_version | int <= 11 else '/boot/firmware/cmdline.txt' }}"

- name: Check NOOBS
  ansible.builtin.command: cat {{ system_config_path }}
  register: system_config_txt
  changed_when: false

# All additive Anthias firmware config (silent boot, framebuffer, GPU
# memory) lives in a single drop-in. config.txt itself only gets one
# `include` line — anything the user has in their config.txt is left
# alone.
- name: Install Anthias firmware drop-in
  ansible.builtin.copy:
    src: anthias.conf
    dest: "{{ system_config_path | dirname }}/anthias.conf"
    owner: root
    group: root
    mode: "0755"  # NOSONAR

- name: Include Anthias drop-in from config.txt
  ansible.builtin.lineinfile:
    dest: "{{ system_config_path }}"
    line: include anthias.conf

# Legacy: pre-Bullseye Pi OS shipped vc4-fkms-v3d (or vc4-kms-v3d
# commented). Bullseye+ already ships KMS active. Kept for back-compat
# with old images.
- name: Uncomment out the original dtoverlay config.
  ansible.builtin.replace:
    dest: "{{ system_config_path }}"
    regexp: '^#\s*(dtoverlay=vc4-kms-v3d)'
    replace: '\1'

- name: Remove the FKMS config for all devices.
  ansible.builtin.lineinfile:
    path: "{{ system_config_path }}"
    state: absent
    regexp: "^dtoverlay=vc4-fkms-v3d$"

- name: Backup kernel boot args
  ansible.builtin.copy:
    src: "{{ system_cmdline_path }}"
    dest: "{{ system_cmdline_path }}.orig"
    owner: root
    group: root
    # cmdline.txt is 0755 on Raspberry Pi by default; the .orig backup
    # mirrors that so raspberry-pi-config tools don't trip on it.
    mode: "0755"  # NOSONAR
    force: false

- name: Notice for cmdline.txt.orig file
  ansible.builtin.debug:
    msg: "Use cmdline.txt.orig for boot parameters (don't remove this file)"

# Render cmdline.txt from the .orig backup using the template. The
# template owns every Anthias-managed kernel parameter (silent boot,
# Plymouth handoff, systemd init, network naming, cgroups). NOOBS images
# manage cmdline.txt themselves — skip when detected.
- name: Read cmdline.txt.orig
  ansible.builtin.slurp:
    src: "{{ system_cmdline_path }}.orig"
  register: system_cmdline_orig
  when: system_config_txt.stdout.find('NOOBS') == -1

- name: Render cmdline.txt from template
  ansible.builtin.copy:
    content: "{{ lookup('template', 'cmdline.txt.j2') }}\n"
    dest: "{{ system_cmdline_path }}"
    owner: root
    group: root
    mode: "0755"  # NOSONAR
  when: system_config_txt.stdout.find('NOOBS') == -1

# Defensive stats — disable login prompts on tty1 whether the active unit
# is the stock getty@tty1.service or raspi-config's autologin@tty1.service.
- name: Look up getty@ template
  ansible.builtin.stat:
    path: /lib/systemd/system/getty@.service
  register: system_getty_template

- name: Look up autologin@ template
  ansible.builtin.stat:
    path: /etc/systemd/system/autologin@.service
  register: system_autologin_template

- name: Disable getty on tty1 (no login prompt on display)
  ansible.builtin.systemd:
    name: getty@tty1.service
    enabled: false
  when: system_getty_template.stat.exists

- name: Disable autologin on tty1 (no auto-login on display)
  ansible.builtin.systemd:
    name: autologin@tty1.service
    enabled: false
  when: system_autologin_template.stat.exists
